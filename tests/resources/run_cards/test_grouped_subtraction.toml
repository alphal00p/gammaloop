commands = [
  "import model scalars-default",
  "import graphs ./tests/resources/graphs/grouped_subtraction/no_group.dot",
  "import graphs ./tests/resources/graphs/grouped_subtraction/group.dot",
  "generate",
]

[default_runtime_settings.general]
m_uv = 1.0
mu_r_sq = 8315.251344

[default_runtime_settings.kinematics]
