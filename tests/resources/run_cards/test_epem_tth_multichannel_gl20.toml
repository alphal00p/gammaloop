commands = [
  "import model sm-default.json",
  "set model MT=173.0",
  "set model MH=125.0",
  "set model WT=0.0",
  "set model ymt=173.0",
  "set model aS=0.118",
  "set model aEWM1=132.507",
  "set model Gf=1.166390e-05",
  "set model MZ=91.188",
  """
  generate xs e+ e- > t t~ h | e+ e- g t t~ h ghG ghG~ a QCD^2==2 QED^2==6 [{{3}} QCD=1]
      --numerator-grouping group_identical_graphs_up_to_scalar_rescaling
      --symmetrize-left-right-states true
      -p epem_a_tth -i NLO
      --global-prefactor-num "1𝑖"
      --only-diagrams
  """,
  "select -p epem_a_tth -i NLO --with-graph-names GL20",
  "generate existing -p epem_a_tth -i NLO",
]

[default_runtime_settings.general]
evaluator_method = "SummedFunctionMap"
enable_cache = false
debug_cache = false
generate_events = true
store_additional_weights_in_event = true
integral_unit = "picobarn"
mu_r = 91.188
m_uv = 91.188

[default_runtime_settings.kinematics]
e_cm = 1000.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [
  [500.0, 0.0, 0.0, 500.0],
  [500.0, 0.0, 0.0, -500.0],
]
helicities = ["summed_averaged", "summed_averaged"]

[default_runtime_settings.sampling]
graphs = "monte_carlo"
orientations = "summed"
lmb_multichanneling = true
lmb_channel_weight = "ose"
lmb_channels = "summed"

[default_runtime_settings.h_function]
function = "poly_exponential"
sigma = 1.0
power = 3

[default_runtime_settings.subtraction]
esurface_existence_threshold = 1.0e-7
disable_threshold_subtraction = false

[default_runtime_settings.stability]
rotation_axis = []

[cli_settings.global.generation.evaluator]
do_algebra = false
iterative_orientation_optimization = false
store_atom = false
compile = false
summed = false
summed_function_map = true

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = true
check_esurface_at_generation = true
esurface_existence_threshold = 1.0e-7
skip_thresholds_that_are_cuts = true

[cli_settings.global.generation.uv]
softct = false
inner_products = true
generate_integrated = true
subtract_uv = true

[cli_settings.global.generation.tropical_subgraph_table]
panic_on_fail = true
disable_tropical_generation = false

[cli_settings.global.n_cores]
feyngen = 1
generate = 5
compile = 1
integrate = 1
