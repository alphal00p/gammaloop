commands = [
    "import model assets/models/json/scalars/scalars_2p_3p.json",
	"set model mass_scalar_1=2.0",
	"set model mass_scalar_2=2.0001",
	"import graphs dotted_double_triangle.dot", 
	"generate",
]



[default_runtime_settings.kinematics]
e_cm = 5.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [
   	[
    	 5.0,
    	 0.0,
    	 0.0,
    	 0.0,
	],
]
helicities = [
    "summed_averaged",
]

[default_runtime_settings.general]
evaluator_method = "SummedFunctionMap"
enable_cache = false
debug_cache = false
generate_events = false
store_additional_weights_in_event = false
integral_unit = "picobarn"


[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = false
compile = false
summed = false
summed_function_map = true

# Otherwise leave them enabled with
[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = true
# The option below specifies the generation of threshold for the kinematics supplied, not used for LU
check_esurface_at_generation = false
disable_integrated_ct = false
skip_thresholds_that_are_cuts = true

[default_runtime_settings.subtraction]
disable_threshold_subtraction = false

[[default_runtime_settings.stability.rotation_axis]]
type = "euler_angles"
alpha = 0.1
beta = 0.2
gamma = 0.3

[cli_settings.global.generation.compile]
compilation_mode = "assembly"
optimization_level = "O3"
fast_math = true
unsafe_math = true
custom = []

[cli_settings.global.generation.uv]
softct=false
inner_products=true

[cli_settings.global.generation]
force_cuts = [['e4','e6'],['e5','e6']]

[cli_settings.global.n_cores]
feyngen = 10
generate = 10
compile = 10
integrate = 10

[cli_settings.global.generation.tropical_subgraph_table]
panic_on_fail = true
disable_tropical_generation = true
