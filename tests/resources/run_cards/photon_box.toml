commands = [
    "import model sm-default", 
    "import amplitude ./tests/resources/graphs/photon_box.dot",
    "generate"
]

[default_runtime_settings.General]
m_uv = 1.0
mu_r_sq = 8315.251344
enable_cache = false

[default_runtime_settings.Kinematics]
e_cm = 1000.0

[default_runtime_settings.Kinematics.externals]
type = "constant"

[default_runtime_settings.Kinematics.externals.data]
momenta = [
    [
    500.0,
    0.0,
    -300.0,
    400.0,
],
    [
    500.0,
    0.0,
    300.0,
    -400.0,
],
    [
    500.0,
    0.0,
    300.0,
    -400.0,
],
    "dependent",
]
helicities = [
    -1,
    -1,
    -1,
    -1,
]

[default_runtime_settings.Integrator]
n_increase = 0
n_start = 10000
n_max = 1000000
discrete_dim_learning_rate = 0.0
continuous_dim_learning_rate = 0.0
max_prob_ratio = 100.0

[default_runtime_settings.Stability]
check_on_norm = true
rotation_axis = []


[[default_runtime_settings.Stability.levels]]
precision = "Double"
required_precision_for_re = 0.00000001
required_precision_for_im = 0.00000001
escalate_for_large_weight_threshold = 0.9

[[default_runtime_settings.Stability.levels]]
precision = "Quad"
required_precision_for_re = 0.00001
required_precision_for_im = 0.00001
escalate_for_large_weight_threshold = -1.0

[default_runtime_settings.subtraction]
disable_threshold_subtraction = false

[global_settings.generation]
enable_thresholds = true

[global_settings.generation.evaluator_settings]
iterative_orientation_optimization = true
compile = true

[default_runtime_settings.sampling]
type = "default"
b = 10.0