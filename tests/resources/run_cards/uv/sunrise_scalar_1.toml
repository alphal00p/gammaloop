#CT(gammalooprs::uv::Truncate(gammalooprs::uv::Series(gammalooprs::uv::Integrate(gammalooprs::uv::Approx(gammalooprs::uv::subgraph(S_3I,0)))))*gammalooprs::uv::subgraph(S_47,S_3I))
