1.0,
#CT(gammalooprs::uv::Approx(gammalooprs::uv::subgraph(S_44,0))*gammalooprs::uv::subgraph(S_47,S_44))
1.0,
#CT(gammalooprs::uv::Approx(gammalooprs::uv::Approx(gammalooprs::uv::subgraph(S_y,0))*gammalooprs::uv::subgraph(S_44,S_y))*gammalooprs::uv::subgraph(S_47,S_44))
1.0,
#CT(gammalooprs::uv::Approx(gammalooprs::uv::Approx(gammalooprs::uv::subgraph(S_3s,0))*gammalooprs::uv::subgraph(S_44,S_3s))*gammalooprs::uv::subgraph(S_47,S_44))
