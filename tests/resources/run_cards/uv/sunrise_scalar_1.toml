1.0,
#CT(gammalooprs::uv::Truncate(gammalooprs::uv::Series(gammalooprs::uv::Integrate(gammalooprs::uv::Approx(gammalooprs::uv::Approx(gammalooprs::uv::subgraph(S_y,0))*gammalooprs::uv::subgraph(S_44,S_y)))))*gammalooprs::uv::subgraph(S_47,S_44))
