commands = []

[cli_settings]
[cli_settings.global]
logfile_directive = "off"
display_directive = "gammaloop_api=info,gammalooprs=info,symbolica=off,poly::gcd=off,gammalooprs::uv::forest[{generation,uv,orientation,dump}]=debug,gammalooprs::uv::approx=debug"

[cli_settings.global.log_style]
include_fields = true

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = true
compile = false
summed = false
summed_function_map = true

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = true
check_esurface_at_generation = false



[cli_settings.global.generation.uv]
add_marker = true

[[command_blocks]]
name = "generate"
commands = [
  "import model scalars-default.json",
  "remove processes",
  "set global kv global.generation.uv.generate_integrated=true",
  "import graphs ./tests/resources/graphs/scalar_sunrise.dot -p sunrise_scalar_1 -i scalar_sunrise",
  "generate existing -p sunrise_scalar_1 -i scalar_sunrise",
  "set model mass_scalar_1=1.0",
]

[default_runtime_settings.sampling]
graphs = "monte_carlo"
orientations = "monte_carlo"
lmb_multichanneling = false
lmb_channels = "summed"
coordinate_system = "spherical"
mapping = "linear"
b = 1.0

[default_runtime_settings.general]
mu_r = 3.0
m_uv = 20.0
additional_param_values = [
#CT(gammalooprs::uv::subgraph(S_47,0))
1.0,
#CT(gammalooprs::uv::Approx(gammalooprs::uv::subgraph(S_y,0))*gammalooprs::uv::subgraph(S_47,S_y))
1.0,
#CT(gammalooprs::uv::Approx(gammalooprs::uv::subgraph(S_3s,0))*gammalooprs::uv::subgraph(S_47,S_3s))
1.0,
