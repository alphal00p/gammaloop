[cli_settings]
[cli_settings.global]
logfile_directive = "off"  # ;,gammalooprs[inspect]=off,gammalooprs[final_integrand]=debug,symbolica=off,gammalooprs[local_3d]=debug"#,gammalooprs[build_original_parametric_integrand]=debug"
display_directive = "info"  # ,gammalooprs[orientation_parametric_exprs]=debug,gammalooprs[kernel]=debug,poly::gcd =off"

[cli_settings.global.log_style]
include_fields = true

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = true
compile = false
summed = false
summed_function_map = true

[cli_settings.global.generation.uv]
generate_only_integrated_uv_with_n_loops = 1

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = false
check_esurface_at_generation = false

[cli_settings.state]
folder = "tests/artifacts/ad_ad_with_gluon_correction"
name = "ad_ad_with_gluon_correction"

[[command_blocks]]
name = "generate"
commands = [
  "import model sm-default",
  "set global kv global.generation.uv.generate_integrated=true",
  "import graphs ./tests/resources/graphs/uv_tests/ad_ad_1L_gluon.dot -p adad -i adad_gluon",
  "generate existing -p adad -i adad_gluon",
  "set global kv global.generation.uv.generate_integrated=false",
  "import graphs ./tests/resources/graphs/uv_tests/ad_ad_1L_gluon.dot -p adad_no_integrated_UV -i adad_gluon",
  "generate existing -p adad_no_integrated_UV -i adad_gluon",
]

[default_runtime_settings.kinematics]
e_cm = 300.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [
  [500.0, 0.0, 0.0, 500.0],
  [500.0, 0.0, 0.0, -500.0],
  [500.0, 300.0, 200.0, 346.4101615],
  "dependent"
]
# helicities = [+1, -1, +1, -1]#gives zero
helicities = [+1, +1, -1, -1]  # integrates correctly

[default_runtime_settings.general]
evaluator_method = "SummedFunctionMap"
enable_cache = false
debug_cache = false
generate_events = false
store_additional_weights_in_event = false
integral_unit = "none"
mu_r = 20.0
m_uv = 20.0

[default_runtime_settings.sampling]
graphs = "monte_carlo"
orientations = "monte_carlo"
lmb_multichanneling = false
lmb_channels = "summed"

[default_runtime_settings.integrator]
target_relative_accuracy = 0.00001
n_increase = 0
n_start = 1000000
n_max = 200000000000
