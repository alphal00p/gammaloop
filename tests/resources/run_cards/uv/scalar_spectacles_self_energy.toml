commands = []

[cli_settings]
[cli_settings.global]
logfile_directive = "off"
display_directive = "gammaloop_api=info,gammalooprs=info,symbolica=off,poly::gcd=off"

[cli_settings.global.log_style]
include_fields = true

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = true
compile = false
summed = false
summed_function_map = true

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = true
check_esurface_at_generation = false

[cli_settings.global.generation.uv]
generate_integrated = true
orchestrator = "hedge_poset"

[[command_blocks]]
name = "generate"
commands = [
  "import model scalars-default.json",
  "remove processes",
  "import graphs ./tests/resources/graphs/scalar_bubble.dot -p bubble -i scalar_bubble",
  "generate existing -p bubble -i scalar_bubble",
  "import graphs ./tests/resources/graphs/uv_tests/scalar_spectacles_self_energy.dot -p spectacles -i scalar_spectacles",
  "generate existing -p spectacles -i scalar_spectacles",
  "set model mass_scalar_2=2.0",
]

[default_runtime_settings.sampling]
graphs = "summed"
orientations = "summed"
lmb_multichanneling = false
lmb_channels = "summed"
coordinate_system = "spherical"
mapping = "linear"
b = 1.0

[default_runtime_settings.general]
integral_unit = "none"
disable_flux_factor = true
mu_r = 3.0
m_uv = 20.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [[1.0, 0.0, 0.0, 0.0], "dependent"]
helicities = [0, 0]

[default_runtime_settings.subtraction]
disable_threshold_subtraction = false

[[default_runtime_settings.stability.rotation_axis]]
type = "z"

[[default_runtime_settings.stability.levels]]
precision = "Double"
required_precision_for_re = 0.0000000001
required_precision_for_im = 0.0000000001
escalate_for_large_weight_threshold = 0.9

[[default_runtime_settings.stability.levels]]
precision = "Quad"
required_precision_for_re = 0.00001
required_precision_for_im = 0.00001
escalate_for_large_weight_threshold = -1.0

[[default_runtime_settings.stability.levels]]
precision = "Arb"
required_precision_for_re = 0.00001
required_precision_for_im = 0.00001
escalate_for_large_weight_threshold = -1.0
