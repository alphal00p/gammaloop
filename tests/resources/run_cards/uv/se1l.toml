commands = []

[cli_settings]
[cli_settings.global]
logfile_directive = "off"
display_directive = "gammaloop_api=info,gammalooprs=info,symbolica=off,poly::gcd=off"

[cli_settings.global.log_style]
include_fields = true

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = true
compile = false
summed = false
summed_function_map = true

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = true
check_esurface_at_generation = false

[[command_blocks]]
name = "generate"
commands = [
  "import model sm-default",
  "remove processes",
  "set global kv global.generation.uv.generate_integrated=true",
  "import graphs ./tests/resources/graphs/uv_tests/se1l.dot -p se1l -i se1l",
  "generate existing -p se1l -i se1l",
  "set global kv global.generation.uv.generate_integrated=false",
  "import graphs ./tests/resources/graphs/uv_tests/se1l.dot -p se1l_no_integrated_UV -i se1l",
  "generate existing -p se1l_no_integrated_UV -i se1l",
]

[default_runtime_settings.sampling]
graphs = "monte_carlo"
orientations = "monte_carlo"
lmb_multichanneling = false
lmb_channels = "summed"
coordinate_system = "spherical"
mapping = "linear"
b = 1.0

[default_runtime_settings.general]
evaluator_method = "SummedFunctionMap"
enable_cache = false
debug_cache = false
generate_events = false
store_additional_weights_in_event = false
integral_unit = "none"
mu_r = 20.0
m_uv = 20.0

[default_runtime_settings.kinematics]
e_cm = 300.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
# The graph-level projector contracts the gluon Lorentz and color indices.
# Keeping this two-point kinematics off shell makes the integrated CT visible.
momenta = [[500.0, 0.0, 0.0, 0.0], "dependent"]
helicities = [+1, -1]

[default_runtime_settings.subtraction]
disable_threshold_subtraction = false

[[default_runtime_settings.stability.rotation_axis]]
type = "z"

[[default_runtime_settings.stability.levels]]
precision = "Double"
required_precision_for_re = 0.0000000001
required_precision_for_im = 0.0000000001
escalate_for_large_weight_threshold = 0.9

[[default_runtime_settings.stability.levels]]
precision = "Quad"
required_precision_for_re = 0.00001
required_precision_for_im = 0.00001
escalate_for_large_weight_threshold = -1.0

[[default_runtime_settings.stability.levels]]
precision = "Arb"
required_precision_for_re = 0.00001
required_precision_for_im = 0.00001
escalate_for_large_weight_threshold = -1.0
