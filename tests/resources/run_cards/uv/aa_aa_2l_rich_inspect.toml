commands = ["run prepare"]

[cli_settings]
[cli_settings.global]
logfile_directive = "off"
display_directive = "off"

[cli_settings.global.n_cores]
feyngen = 1
generate = 1
compile = 1
integrate = 1

[cli_settings.global.generation]
override_lmb_heuristics = true

[cli_settings.global.generation.uv]
softct = false
generate_integrated = true
add_integrated_uv_with_n_loops = 1
subtract_uv = true
only_integrated = false
pole_part = false
add_sigma = false
keep_sigma = true
inner_products = true
use_legacy = true
cached = true

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = false
compile = false
summed = false
summed_function_map = true
horner_iterations = 5
cpe_iterations = 5

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = false
check_esurface_at_generation = false

[cli_settings.global.generation.tropical_subgraph_table]
panic_on_fail = true
disable_tropical_generation = true

[default_runtime_settings.kinematics]
e_cm = 300.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [
  [86.5, 0.0, 0.0, 86.5],
  [86.5, 0.0, 0.0, -86.5],
  [86.5, 0.0, -79.27855952273603, -34.6],
  "dependent",
]
helicities = [+1, +1, -1, -1]

[default_runtime_settings.general]
evaluator_method = "SummedFunctionMap"
enable_cache = false
debug_cache = false
generate_events = true
store_additional_weights_in_event = true
integral_unit = "none"
mu_r = 91.188
m_uv = 9.188

[default_runtime_settings.subtraction]
disable_threshold_subtraction = true

[default_runtime_settings.sampling]
graphs = "monte_carlo"
orientations = "summed"
lmb_multichanneling = true
lmb_channels = "summed"
lmb_channel_weight = "inverse_jacobian"
coordinate_system = "spherical"
mapping = "linear"
b = 1.0

[default_runtime_settings.stability]
check_on_norm = true
escalate_if_exact_zero = false
loop_momenta_norm_escalation_factor = -1.0

[[default_runtime_settings.stability.rotation_axis]]
type = "z"

[[default_runtime_settings.stability.levels]]
precision = "Double"
required_precision_for_re = 1.0e-10
required_precision_for_im = 1.0e-10
escalate_for_large_weight_threshold = 0.9

[[command_blocks]]
name = "prepare"
commands = [
  "import model sm-default.json",
  "set model MT=173.0",
  "set model WT=0.0",
  "set model ymt=173.0",
  "set model aS=0.118",
  "set model aEWM1=137.036",
  "set model Gf=1.166390e-05",
  "set model MZ=91.188",
]

[[command_blocks]]
name = "generate_gl00"
commands = [
  "set global kv global.generation.uv.generate_integrated=true",
  "import graphs ./examples/cli/aa_aa/2L/graphs/GL00.dot -p aa_aa_2l_gl00 -i 2L -o",
  "generate existing -p aa_aa_2l_gl00 -i 2L",
  "set process -p aa_aa_2l_gl00 -i 2L kv general.generate_events=true general.store_additional_weights_in_event=true",
  "set global kv global.generation.uv.generate_integrated=false",
  "import graphs ./examples/cli/aa_aa/2L/graphs/GL00.dot -p aa_aa_2l_gl00_no_integrated_UV -i 2L -o",
  "generate existing -p aa_aa_2l_gl00_no_integrated_UV -i 2L",
  "set process -p aa_aa_2l_gl00_no_integrated_UV -i 2L kv general.generate_events=true general.store_additional_weights_in_event=true",
]

