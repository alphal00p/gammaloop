#:schema https://raw.githubusercontent.com/alphal00p/gammaloop/refs/heads/hedge_numerator/assets/schemas/runhistory.json

commands = []

[[command_blocks]]
name = "import_graph"
commands = [
  "import model scalars-default.json",
  "import graphs ./tests/resources/graphs/scalar_bubble.dot"
]

[[command_blocks]]
name = "no_integrated"
commands = [
  "set global kv  global.generation.uv.generate_integrated=false",
]

[[command_blocks]]
name = "integrated"
commands = [
  "set global kv  global.generation.uv.generate_integrated=true",
]

[cli_settings.global.generation.uv]
softct = true

[default_runtime_settings.kinematics.externals]
type = "constant"

# [default_runtime_settings.kinematics]
# e_cm = 0.2

[default_runtime_settings.kinematics.externals.data]
momenta = [
  [
    0.0,
    0.0,
    0.0,
    0.0,
  ],
  "dependent",
]
helicities = [1, 1]

[default_runtime_settings.stability]
rotation_axis = []
check_on_norm = true

[default_runtime_settings.general]
m_uv = 5.0

[default_runtime_settings.subtraction]
disable_threshold_subtraction = false

[default_runtime_settings.sampling]
graphs = "summed"
orientations = "summed"
lmb_multichanneling = false
lmb_channels = "summed"
coordinate_system = "spherical"
mapping = "linear"

[default_runtime_settings.integrator]
seed = 42
n_increase = 0
n_start = 10000
n_max = 100000
discrete_dim_learning_rate = 1.5
continuous_dim_learning_rate = 1.5
max_prob_ratio = 0.01

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = true

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = true
compile = false
