commands = [
"import model sm",
"import graphs tests/resources/graphs/epem_dd_dt.dot",
"generate",
]

[default_runtime_settings.kinematics]
e_cm = 1.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [[91.188, 0.0, 0.0, 0.0]]
helicities = [1]

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = true
compile = false

[cli_settings.global.generation]
enable_thresholds = false

[default_runtime_settings.sampling]
type = "discrete_graph_sampling"

[default_runtime_settings.sampling.sampling_type]
subtype = "discrete_multi_channeling"

[default_runtime_settings.integrator]
n_max = 100000000
n_start = 100000

#[cli_settings.global.generation.orientation_pattern]
#pat = "orientation_delta(1,1,1,-1,1,-1,1)"

