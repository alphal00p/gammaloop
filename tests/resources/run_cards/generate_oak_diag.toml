commands = [
  "import model scalars-default.json",
  "set model mass_scalar_2=1.0",
  "import graphs ./tests/resources/graphs/oak_diag.dot",
  "generate",
  "quit"
  # "inspect -p 0 -i box -m -x 0.1 0.2 0.3",
]

[default_runtime_settings.kinematics]
e_cm = 10.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [
  "dependent",
  [
    1.1180339887498949,
    0.0000000000000000,
    0.0000000000000000,
    0.5000000000000000
  ],
  [
    -1.1180339887498949,
    0.0000000000000000,
    0.0000000000000000,
    0.5000000000000000
  ],
  [
    1.5652475842498528,
    0.1095445115010332,
    1.0899541274750970,
    0.5000000000000000
  ],
]
helicities = [1, 1, 1, 1]

[default_runtime_settings.stability]
check_on_norm = true

[[default_runtime_settings.stability.rotation_axis]]
type = "euler_angles"
alpha = 0.4
beta = 0.3
gamma = 0.2

[default_runtime_settings.subtraction]
disable_threshold_subtraction = true

[default_runtime_settings.sampling]
graphs = "monte_carlo"
orientations = "summed"
lmb_multichanneling = false
lmb_channels = "summed"
coordinate_system = "tropical"

[default_runtime_settings.integrator]
seed = 42
n_increase = 0
n_start = 10000
n_max = 1000000
discrete_dim_learning_rate = 1.0
continuous_dim_learning_rate = 1.0
max_prob_ratio = 0.01

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = false

[cli_settings.global.generation.tropical_subgraph_table]
panic_on_fail = false
target_omega = 1.0
disable_tropical_generation = false
# disable_tropical_generation = false

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = true
compile = true

[cli_settings.global.generation.compile]
compilation_mode = "c++"
optimization_level = "O3"
fast_math = true
unsafe_math = true
custom = []
