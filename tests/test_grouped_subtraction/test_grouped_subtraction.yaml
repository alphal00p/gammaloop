global_settings:
  debug_level: Info
  generation:
    enable_thresholds: true
    evaluator_settings:
      iterative_orientation_optimization: true
      compile: true
    gammaloop_compile_options:
      inline_asm: true
      optimization_level: O3
default_runtime_settings:
  General:
    amplitude_prefactor:
      re: 0.0
      im: 1.0
    m_uv: 1.0
    mu_r_sq: 8315.251344
  subtraction:
    disable_threshold_subtraction: false
  Integrator:
    n_bins: 64
    bin_number_evolution: null
    min_samples_for_update: 1000
    n_start: 1000000
    n_increase: 0
    n_max: 10000000
    integrated_phase: real
    discrete_dim_learning_rate: 1.5
    continuous_dim_learning_rate: 0.5
    train_on_avg: false
    show_max_wgt_info: true
    max_prob_ratio: 0.01
    seed: 69
  Kinematics:
    e_cm: 2.0
    externals:
      type: constant
      data:
        momenta:
        - dependent
        - - -0.29166666667
          - 0.0
          - 0.0
          - -0.4061164310337068
        - - 0.70833333333
          - 0.0
          - 0.0
          - 0.4061164310337068
        - - 0.3200 
          - 0.0 
          - 0.0 
          - 0.6400
        helicities:
        - 1
        - 1
        - 1
  Stability:
    rotations: []
    levels:
      - required_precision_for_re: 1e-15
        required_precision_for_im: 1e-15
        escalate_for_large_weight_threshold: 0.9
      - precision: Quad
        required_precision_for_re: 0.00001
        required_precision_for_im: 0.00001
        escalate_for_large_weight_threshold: -1.0
  sampling:
    type: discrete_graph_sampling
    subtype: default
    mode: spherical
    mapping: linear
    b: 1.0
commands:
  - Import:
      Model:
        path: ./src/test_resources/gammaloop_models/scalars.yaml
  - Import:
      Amplitude:
        path: ./tests/test_grouped_subtraction/no_group.dot
  - Import:
      Amplitude:
        path: ./tests/test_grouped_subtraction/group.dot
  - Generate: {}
  - Integrate:
      process_id: 0
      process_name: no_group
      result_path: ./tests/test_grouped_subtraction/integration_workspace_no_group/integration_results.yaml
      n_cores: 1
      workspace_path: ./tests/test_grouped_subtraction/integration_workspace_no_group/
      target: null
      restart: true
  - Integrate:
      process_id: 1
      process_name: group
      result_path: ./tests/test_grouped_subtraction/integration_workspace_group/integration_results.yaml
      n_cores: 1
      workspace_path: ./tests/test_grouped_subtraction/integration_workspace_group/
      target: null
      restart: true

