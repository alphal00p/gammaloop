[package]
name = "gammalooprs"
version = "0.3.3"
edition = "2024"
authors = ["Valentin Hirschi <valentin.hirschi@gmail.com>"]
categories = ["science"]
description = "An implementation of the Local Unitarity method for computing differential collider cross-sections."
keywords = ["loop", "cross-section", "perturbative", "physics"]
license = "MIT OR Apache-2.0"
# license-file = "LICENSE.md"
readme = "README.md"
repository = "https://github.com/alphal00p/gammaloop"
build = "build.rs"

[workspace]
members = ["gammaloop-api"]

[profile.dev-optim]
inherits = "dev"
opt-level = 2
#lto=true

[profile.bench]
lto = "fat"
opt-level = 3

[profile.profiling]
inherits = "release"
lto = "fat"
opt-level = 3
debug = true

# [[bench]]
# name = "inspect"
# harness = false

[profile.release]
lto = "fat"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
gammaloop_api = { path = "./gammaloop-api", package = "gammaloop-api" }
# oneloop_bridge = { git = "https://github.com/SecretGmG/OneLOopBridge", version = "0.2.0" }

[profile.dev.package]
insta.opt-level = 3

# [dependencies]
# symbolica = { version = "0.18.0", default-features = false, features = [
#     "serde",
#     "bincode",
#     # "tracing_only_warnings",
# ] } # These will be patched
# # symbolica_community = { git = "https://github.com/alphal00p/symbolica-community", rev = "5231643e98ebcb52faa44eba065d62fc2a09c0e6", features = [
# #     "bincode",
# # ] }

[dependencies]
symbolica = { version = "1", default-features = false, features = [
    "serde",
    "bincode",
] }

idenso = { version = "0.3", features = ["bincode"] }
spenso-macros = { version = "0.3" }
spenso-hep-lib = { version = "0.1.7" }
spenso = { version = "0.6", features = ["shadowing"] }
linnet = { version = "0.16.1", features = [
    # "drawing",
    "serde",
    "bincode",
    "symbolica",
] }

# vakint = { git = "https://github.com/alphal00p/vakint", rev = "a32723f7c56ce73dd6a35713880e3a924e72c51b" } # "e44c210ded3936048615d39872022a0b6ef18454"
momtrop = { version = "0.3.0" }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "*"
bincode = { version = "2.0.0", features = ["serde"] }
clap = { version = "4.5.41", features = [
    "derive",
    "env",
    "unicode",
    "wrap_help",
] }
color-eyre = { version = "0.6", default-features = false }
eyre = "^0.6"

rand = { version = "0.9", features = ["small_rng"] }
rayon = "1.5"
dirs = "5"
# clap-repl = "0.3.2"
indicatif = { version = "0.17.9", features = ["improved_unicode", "rayon"] }
# bincode-trait-derive = {path="../bincode-trait-derive"}
bincode-trait-derive = { version = "0.1.1" }
enum_dispatch = "*"
git-version = "0.3"
colored = "*"
libc = "0.2.0"
statrs = "0.16.0"
smallvec = { version = "1.7", features = ["const_generics", "serde"] }
itertools = "0.14"
smartstring = { version = "*", features = ["serde"] }
# log = { version = "*", features = ["release_max_level_debug"] }
# env_logger = "*"
# pyo3-log = { version = "0.12.0", optional = true }
nalgebra = "0.32.3"

clarabel = "0"
# petgraph = "0.6.4"
indexmap = "2.2.2"
ahash = { version = "0.8.8", features = ["serde"] }
# num = { version = "0.4.1", features = ["serde"] }
# pprof = { version = "0.15.0", features = ["criterion", "flamegraph"] }
derive_more = "0.99.17"
serde_json = "1.0.115"
ctrlc = "3.4.4"
# constcat = "0.5.0"
ref-ops = "0.2.5"
delegate = "0.12.0"
include_dir = "0.7"
typed-index-collections = { version = "3.3.0", features = [
    "serde",
    "serde-alloc",
    "bincode",
] }

# gxhash = "3.4.1"
thiserror = "1.0.63"
serde_repr = "0.1.19"
# compensated-summation = "0.3.0"
serde_with = "3.9.0"
tabled = { version = "0.20.0", features = ["ansi"] }
pathfinding = "4.11.0"
insta = { version = "1.40.0", features = ["json", "ron", "serde", "toml"] }
which = "8.0.0"
slotmap = { version = "1.0.7", features = ["serde"] }
base62 = "2.0.2"
brotli = "7.0.0"
# cgmath = "0.18.0"
# argmin = "0.10.0"
# by_address = "1.2.1"
# pyo3-pylogger = { version = "0.3.0", optional = true }
# humantime = "2.1.0"
linreg = "0.2.0"
dot-parser = "0.5.1"
pyo3-stub-gen = { version = "0.13", optional = true, default-features = false }


tracing-subscriber = { version = "0.3.19", features = [
    "env-filter",
    "fmt",
    "time",
    "json",
] }

paste = "1.0.15"
tracing = { version = "0.1.41", features = ["release_max_level_info"] }
toml = "0.9.5"
tracing-appender = "0.2.3"
comemo = "0.5.0"
schemars = "1.0.4"
ringbuffer = "0.16.0"
tracing-indicatif = "0.3.13"

# gmp-mpfr-sys = { version = "1.6", features = ["use-system-libs"] }
rug = { version = "1.27.0", features = ["serde"] }
vakint = "0.1.2"
vectorize = "0.2.0"
[dependencies.pyo3]
features = ["eyre", "auto-initialize"]
optional = true
version = "0.25"

[build-dependencies]
# pyo3-build-config = "*"
vergen = { version = "9", default-features = false }
vergen-gitcl = "1"
#pyo3-build-config = "*"

[lib]
# required-features = ["python_api"]
bench = false

[features]
default = []
python_api = ["pyo3"]
python_abi = ["python_api", "pyo3/abi3", "pyo3/abi3-py37"]
# insta.opt-level = 3
python_stubgen = ["python_api", "pyo3-stub-gen"]
fjcore = []
fail-on-warnings = []
higher_loops = []

# use-system-gmp = ["rug/gmp-mpfr-sys/use-system-libs"]

