

[workspace]
members = ["crates/*", "tests"]
default-members = ["crates/gammaloop-api"]
resolver = "2"

[patch.crates-io]
symbolica = { git = "https://github.com/benruijl/symbolica", branch = "dev" }
numerica = { git = "https://github.com/benruijl/symbolica", branch = "dev" }
graphica = { git = "https://github.com/benruijl/symbolica", branch = "dev" }
linnet = { git = "https://github.com/alphal00p/linnet", rev = "406272c24bcb5bde5551d7d29620459e0671c82e" }
spenso = { git = "https://github.com/alphal00p/spenso", rev = "c052f22dc98a18535e114eede758674befc2758f" }
idenso = { git = "https://github.com/alphal00p/spenso", rev = "c052f22dc98a18535e114eede758674befc2758f" }
spenso-hep-lib = { git = "https://github.com/alphal00p/spenso", rev = "c052f22dc98a18535e114eede758674befc2758f" }
spenso-macros = { git = "https://github.com/alphal00p/spenso", rev = "c052f22dc98a18535e114eede758674befc2758f" }
vakint = { git = "https://github.com/alphal00p/vakint", rev = "bf91ee57aa62604c7ae3fb919203bf6f09544470" }


[profile.bench]
opt-level = 3
lto = "fat"

[profile.dev.package]
insta.opt-level = 3


[profile.release]
lto = "fat"

[profile.dev-optim]
inherits = "dev"
opt-level = 2
# lto=true

[profile.profiling]
inherits = "release"
opt-level = 3
debug = true
lto = "fat"
