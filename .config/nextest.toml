# Nextest configuration for gammaloop
# This file configures test execution, timeouts, and partitioning behavior

[profile.default]
# Slow tests get extra time
slow-timeout = { period = "10s", terminate-after = 6 }
# Test threads - use all available cores for maximum parallelism
test-threads = "num-cpus"
fail-fast = false
# Failure output configuration
failure-output = "immediate"
success-output = "never"
# Retry configuration for flaky tests
retries = 1
# Status level configuration
status-level = "fail"
final-status-level = "fail"

[[profile.default.overrides]]
# Mark integration tests as slow
filter = "test(integration)"
test-group = "integration"

[[profile.default.overrides]]
# Mark tests with "heavy" in the name as memory-intensive
filter = "test(heavy) or test(memory) or test(large)"
test-group = "memory-intensive"

[[profile.default.overrides]]
# Mark benchmark-style tests as very slow
filter = "test(bench) or test(benchmark)"

[profile.default.junit]
# Default JUnit output location
path = "target/nextest/default/junit.xml"

[profile.test_gammaloop]
inherits = "default"
# Reuse the default profile behavior but disable early termination for this curated suite.
slow-timeout = "30y"
default-filter = "not test(/(^|::)(slow|failing)::/)"

[profile.ci]
slow-timeout = { period = "120s", terminate-after = 2 }
# Use all available cores in CI for faster execution
test-threads = "num-cpus"
# More verbose output for debugging CI failures
failure-output = "immediate-final"
success-output = "never"
# No retries in CI to avoid masking real issues
retries = 0
# Fail fast disabled to collect all failures
fail-fast = false
# Enhanced status reporting
status-level = "fail"
final-status-level = "fail"

[profile.ci.junit]
# JUnit output for CI systems
path = "target/nextest/ci/junit.xml"

[profile.ci_gammaloop]
inherits = "ci"
default-filter = "not test(/(^|::)(slow|failing)::/)"

[profile.ci_gammaloop.junit]
path = "target/nextest/ci/junit.xml"

[[profile.ci_gammaloop.overrides]]
# Vakint tests can end up running restricted Symbolica instances in nix-ci,
# which behaves as a singleton per machine when the full license is unavailable.
filter = "package(vakint)"
test-group = "symbolica-singleton"

[[profile.ci.overrides]]
# In CI, be extra conservative with timeouts
filter = "test(integration) or test(heavy) or test(memory) or test(large)"

[[profile.ci.overrides]]
# Benchmark tests get even more time in CI
filter = "test(bench) or test(benchmark)"

[profile.partition]
slow-timeout = { period = "120s", terminate-after = 2 }
# Use multiple threads even in partitions for better performance
test-threads = "num-cpus"
failure-output = "immediate"
success-output = "never"
retries = 0
fail-fast = false

[test-groups]
# Group integration tests that might be slow - allow some parallelism
integration = { max-threads = 2 }
# Group tests that use a lot of memory - limit but don't serialize completely
memory-intensive = { max-threads = 2 }
# Group tests that might be flaky - serialize these for stability
flaky = { max-threads = 1 }
# Serialize packages that depend on a singleton external runtime in CI.
symbolica-singleton = { max-threads = 1 }

[profile.local_test]
fail-fast = true
slow-timeout = { period = "1m", terminate-after = 3, on-timeout = "pass" }
global-timeout = "120m"

[profile.local_test_all]
slow-timeout = { period = "5m" }
fail-fast = false
