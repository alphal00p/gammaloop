name: Continuous integration

on: [push, pull_request, merge_group]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  RUSTDOCFLAGS: "-Dwarnings"

permissions:
  contents: read

jobs:
  # Aggregate matrix and checks into one status for branch protection.
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: [test-matrix, checks]
    if: always()
    steps:
      - name: Tests successful
        if: ${{ !(contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: exit 0
      - name: Tests failing
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

  test-matrix:
    name: Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      SYMBOLICA_LICENSE: ${{ secrets.SYMBOLICA_LICENSE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            python3 \
            python3-dev

      - name: Install macOS dependencies
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew update
          brew install pkg-config openssl@3 gmp mpfr libmpc

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          key: tests-${{ matrix.os }}

      - name: Set fallback Symbolica license
        run: |
          if [ -z "${SYMBOLICA_LICENSE:-}" ]; then
            echo "SYMBOLICA_LICENSE=GAMMALOOP_USER" >> "$GITHUB_ENV"
          fi

      - name: Run tests
        run: cargo nextest run --workspace --profile ci --locked --no-fail-fast

      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 7

  checks-matrix:
    name: Checks (${{ matrix.check }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        check: [clippy, fmt, doc]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            python3 \
            python3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          key: checks-ubuntu

      - name: Run clippy
        if: matrix.check == 'clippy'
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run fmt
        if: matrix.check == 'fmt'
        run: cargo fmt --all -- --check

      - name: Run doc
        if: matrix.check == 'doc'
        run: cargo doc --workspace --no-deps --locked

  checks:
    name: Checks
    runs-on: ubuntu-latest
    needs: [checks-matrix]
    if: always()
    steps:
      - name: Checks successful
        if: ${{ !(contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: exit 0
      - name: Checks failing
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
