name: Continuous integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
env:
  CARGO_TERM_COLOR: always
  SYMBOLICA_LICENSE: ${{ secrets.SYMBOLICA_LICENSE }}

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - '.cargo/**'
              - 'justfile'
              - '.github/workflows/**'

  # Aggregate matrix and checks into one status for branch protection.
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: [changes, test-matrix, checks]
    if: always()
    steps:
      - name: Tests successful
        if: ${{ !(contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: exit 0
      - name: Tests failing
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

  test-matrix:
    name: Tests
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      SYMBOLICA_LICENSE: ${{ secrets.SYMBOLICA_LICENSE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            form \
            pkg-config \
            libssl-dev \
            libgmp-dev \
            libmpfr-dev \
            just \
            libmpc-dev \
            python3 \
            python3-dev

      - name: Install macOS dependencies
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew update
          brew install pkg-config openssl@3 gmp mpfr libmpc just form

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          key: cargo-${{ matrix.os }}

      - name: Set fallback Symbolica license
        run: |
          if [ -z "${SYMBOLICA_LICENSE:-}" ]; then
            echo "SYMBOLICA_LICENSE=GAMMALOOP_USER" >> "$GITHUB_ENV"
          fi

      - name: Verify external tools
        run: |
          command -v form
          form
          command -v python3
          python3 --version

      - name: Run tests
        run: just test-ci

      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 7

  checks-matrix:
    name: Checks (${{ matrix.check }})
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        check: [clippy, fmt, doc]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            python3 \
            just \
            python3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        if: matrix.check != 'fmt'
        with:
          key: cargo-ubuntu-latest

      - name: Run clippy
        if: matrix.check == 'clippy'
        run: just clippy -- -D warnings

      - name: Run fmt
        if: matrix.check == 'fmt'
        run: just fmt -- --check

      - name: Run doc
        if: matrix.check == 'doc'
        run: just doc

  checks:
    name: Checks
    runs-on: ubuntu-latest
    needs: [changes, checks-matrix]
    if: always()
    steps:
      - name: Checks successful
        if: ${{ !(contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: exit 0
      - name: Checks failing
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
