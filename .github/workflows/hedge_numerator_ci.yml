name: Hedge Numerator CI

on:
  push:
    branches: ["hedge_numerator"]
  pull_request:
    branches: ["hedge_numerator"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Configure partition count here - change this to scale parallelism
  PARTITION_COUNT: 6

jobs:
  build-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Cachix
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=nix-deps-${{ hashFiles('**/flake.lock', '**/Cargo.lock') }}" >> $GITHUB_OUTPUT

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            nix-deps-

      - name: Build cargo dependencies
        run: |
          nix build .#cargoArtifacts --print-build-logs

  clippy:
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: ${{ needs.build-deps.outputs.cache-key }}
          restore-keys: |
            nix-deps-

      - name: Run clippy
        run: |
          nix build .#checks.x86_64-linux.gammaloop-clippy --print-build-logs

  fmt:
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: ${{ needs.build-deps.outputs.cache-key }}
          restore-keys: |
            nix-deps-

      - name: Check formatting
        run: |
          nix build .#checks.x86_64-linux.gammaloop-fmt --print-build-logs

  test:
    if: always()
    needs: build-deps
    environment: Cachix
    strategy:
      matrix:
        # Use multiple runners for test partitioning
        partition: [1, 2, 3, 4, 5, 6]
        os: [ubuntu-latest]
        include:
          # Also test on macOS for one partition to ensure cross-platform compatibility
          - os: macos-latest
            partition: 1

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history for better caching
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ matrix.os == 'macos-latest' }}

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: ${{ needs.build-deps.outputs.cache-key }}-${{ matrix.os }}
          restore-keys: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-${{ matrix.os }}-
            nix-deps-

      - name: Run nextest (partition ${{ matrix.partition }})
        run: |
          nix build .#checks.x86_64-linux.gammaloop-nextest-partition-${{ matrix.partition }} --print-build-logs
        timeout-minutes: 60

      - name: Run doctests
        if: matrix.partition == 1
        run: |
          nix develop --command cargo test --doc --verbose
        timeout-minutes: 30

      - name: Generate test report
        if: always()
        run: |
          nix develop --command cargo nextest run \
            --partition hash:${{ matrix.partition }}/${{ env.PARTITION_COUNT }} \
            --reporter junit \
            --output-file nextest-report-${{ matrix.partition }}.xml \
            --test-threads 1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.partition }}
          path: |
            nextest-report-*.xml
            target/nextest/default/junit.xml
          retention-days: 7

  security-audit:
    if: always()
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: ${{ needs.build-deps.outputs.cache-key }}
          restore-keys: |
            nix-deps-

      - name: Run security audit
        run: |
          nix build .#checks.x86_64-linux.gammaloop-audit --print-build-logs

      - name: Run license check
        run: |
          nix build .#checks.x86_64-linux.gammaloop-deny --print-build-logs

  build:
    if: always()
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: ${{ needs.build-deps.outputs.cache-key }}
          restore-keys: |
            nix-deps-

      - name: Build main package
        run: |
          nix build --print-build-logs

      - name: Build documentation
        run: |
          nix build .#checks.x86_64-linux.gammaloop-doc --print-build-logs

  coverage:
    if: always()
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: ${{ needs.build-deps.outputs.cache-key }}
          restore-keys: |
            nix-deps-

      - name: Generate coverage report
        run: |
          nix build .#packages.x86_64-linux.gammaloop-llvm-coverage --print-build-logs

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: result/lcov.info
          fail_ci_if_error: false
