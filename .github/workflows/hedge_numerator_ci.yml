name: Hedge Numerator CI

on:
  push:
    branches: ["hedge_numerator"]
  pull_request:
    branches: ["hedge_numerator"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Configure partition count here - change this to scale parallelism
  PARTITION_COUNT: 6

jobs:
  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: nix-clippy-${{ hashFiles('**/flake.lock') }}
          restore-keys: |
            nix-clippy-

      - name: Build dependencies
        run: |
          # Build cargo dependencies first for better caching
          nix build .#cargoArtifacts --print-build-logs

      - name: Run clippy
        run: |
          nix run .#clippy

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: nix-fmt-${{ hashFiles('**/flake.lock') }}
          restore-keys: |
            nix-fmt-

      - name: Check formatting
        run: |
          nix run .#fmt

  test:
    if: always()
    environment: Cachix
    strategy:
      matrix:
        # Use multiple runners for test partitioning
        partition: [1, 2, 3, 4, 5, 6]
        os: [ubuntu-latest]
        include:
          # Also test on macOS for one partition to ensure cross-platform compatibility
          - os: macos-latest
            partition: 1

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history for better caching
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ matrix.os == 'macos-latest' }}

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: nix-test-${{ matrix.os }}-${{ hashFiles('**/flake.lock') }}
          restore-keys: |
            nix-test-${{ matrix.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      - name: Build dependencies
        run: |
          # Build cargo dependencies first for better caching
          nix build .#cargoArtifacts --print-build-logs

      - name: Run nextest (partition ${{ matrix.partition }})
        run: |
          # Use flake app for nextest partitioning
          nix run .#nextest-partition -- ${{ matrix.partition }} ${{ env.PARTITION_COUNT }}
        timeout-minutes: 60

      - name: Run doctests
        if: matrix.partition == 1
        run: |
          nix develop --command cargo test --doc --verbose
        timeout-minutes: 30

      - name: Generate test report
        if: always()
        run: |
          nix run .#nextest-partition -- ${{ matrix.partition }} ${{ env.PARTITION_COUNT }} \
            --reporter junit \
            --output-file nextest-report-${{ matrix.partition }}.xml || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.partition }}
          path: |
            nextest-report-*.xml
            target/nextest/default/junit.xml
          retention-days: 7

  security-audit:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Run security audit
        run: |
          nix build .#my-crate-audit --print-build-logs

      - name: Run license check
        run: |
          nix build .#my-crate-deny --print-build-logs

  build:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build main package
        run: |
          nix build --print-build-logs

      - name: Build documentation
        run: |
          nix build .#my-crate-doc --print-build-logs

  coverage:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Generate coverage report
        run: |
          nix build .#my-crate-llvm-coverage --print-build-logs

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: result/lcov.info
          fail_ci_if_error: false
