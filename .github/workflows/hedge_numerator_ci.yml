name: Hedge Numerator CI

on:
  push:
    branches: ["hedge_numerator", "main"]
  pull_request:
    branches: ["hedge_numerator", "main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  partition-config:
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.partitions.outputs.count }}
      list: ${{ steps.partitions.outputs.list }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set partition configuration
        id: partitions
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          count="$(nix eval --raw .#ci.${system}.partitionCount)"
          list=$(seq 1 "$count" | paste -sd, -)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "list=[$list]" >> $GITHUB_OUTPUT

  build-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Cachix
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=nix-deps-${{ hashFiles('**/flake.lock', '**/Cargo.lock') }}" >> $GITHUB_OUTPUT

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ steps.cache-key.outputs.key }}-build-deps
          restore-prefixes-first-match: |
            nix-deps-

      - name: Build cargo dependencies
        run: |
          echo "Starting dependency build at $(date)"
          time nix build .#cargoArtifacts --print-build-logs
          echo "Dependencies built at $(date)"

  package:
    if: needs.build-deps.result == 'success'
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: Cachix
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-package
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Build main package
        run: |
          echo "Starting package build at $(date)"
          time nix build .#default --print-build-logs
          echo "Package build completed at $(date)"

  clippy:
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-clippy
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Run clippy
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          echo "Starting clippy at $(date)"
          time nix build ".#checks.${system}.gammaloop-clippy" --print-build-logs
          echo "Clippy completed at $(date)"

  fmt:
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-fmt
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Check formatting
        id: fmt_check
        continue-on-error: true
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build ".#checks.${system}.gammaloop-fmt" --print-build-logs

      - name: Formatting summary
        if: always()
        run: |
          if [ "${{ steps.fmt_check.outcome }}" = "success" ]; then
            echo "### Formatting" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: PASS" >> "$GITHUB_STEP_SUMMARY"
            echo "- Command: \`nix build .#checks.\${system}.gammaloop-fmt --print-build-logs\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Formatting" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: FAIL" >> "$GITHUB_STEP_SUMMARY"
            echo "- Command: \`nix build .#checks.\${system}.gammaloop-fmt --print-build-logs\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- See the 'Check formatting' step logs for details." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if formatting check failed
        if: steps.fmt_check.outcome != 'success'
        run: exit 1

  test:
    if: needs.build-deps.result == 'success' && needs.partition-config.result == 'success' && needs.nextest-archive.result == 'success'
    needs: [build-deps, partition-config, nextest-archive]
    environment: Cachix
    permissions:
      checks: write
      contents: read
    env:
      SYMBOLICA_LICENSE: ${{ secrets.SYMBOLICA_LICENSE }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        # Use multiple runners for test partitioning
        partition: ${{ fromJSON(needs.partition-config.outputs.list) }}
        os: [ubuntu-latest]
        include:
          # Also test on macOS for one partition to ensure cross-platform compatibility
          - os: macos-latest
            partition: 1

    runs-on: ${{ matrix.os }}
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history for better caching
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ matrix.os == 'macos-latest' }}

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-test-${{ matrix.partition }}-${{ matrix.os }}
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}-${{ matrix.os }}
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-${{ matrix.os }}-
            nix-deps-

      - name: Download nextest archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive-${{ matrix.os }}
          path: .

      - name: Run nextest (partition ${{ matrix.partition }})
        run: |
          echo "Starting nextest partition ${{ matrix.partition }} at $(date)"
          echo "Available disk space:"
          df -h
          echo "Available memory:"
          free -h || vm_stat
          time nix develop --command cargo nextest run \
            --profile ci \
            --archive-file ./nextest-archive.tar.zst \
            --workspace-remap "$GITHUB_WORKSPACE" \
            --partition hash:${{ matrix.partition }}/${{ needs.partition-config.outputs.count }} \
            --no-fail-fast
          echo "Nextest partition ${{ matrix.partition }} completed at $(date)"
        timeout-minutes: 120

      - name: Run doctests
        if: matrix.partition == 1
        run: |
          echo "Starting doctests at $(date)"
          time nix develop --command cargo test --doc --verbose
          echo "Doctests completed at $(date)"
        timeout-minutes: 60

      - name: Publish test results (Linux)
        if: ${{ !cancelled() && runner.os == 'Linux' }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: Test Results (${{ matrix.os }} / partition ${{ matrix.partition }})
          comment_mode: off
          action_fail_on_inconclusive: false
          files: target/nextest/ci/junit.xml

      - name: Publish test results (macOS)
        if: ${{ !cancelled() && runner.os == 'macOS' }}
        uses: EnricoMi/publish-unit-test-result-action/macos@v2
        with:
          check_name: Test Results (${{ matrix.os }} / partition ${{ matrix.partition }})
          comment_mode: off
          action_fail_on_inconclusive: false
          files: target/nextest/ci/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.partition }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 7

  nextest-archive:
    if: needs.build-deps.result == 'success'
    needs: build-deps
    environment: Cachix
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ matrix.os == 'macos-latest' }}

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-nextest-archive-${{ matrix.os }}
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}-${{ matrix.os }}
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-${{ matrix.os }}-
            nix-deps-

      - name: Build nextest archive
        run: |
          rm -f nextest-archive.tar.zst
          time nix develop --command cargo nextest archive \
            --profile ci \
            --archive-file nextest-archive.tar.zst

      - name: Upload nextest archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive-${{ matrix.os }}
          path: nextest-archive.tar.zst
          if-no-files-found: error
          retention-days: 1

  docs:
    if: needs.build-deps.result == 'success'
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-docs
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Build documentation
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build ".#checks.${system}.gammaloop-doc" --print-build-logs

  coverage:
    if: needs.build-deps.result == 'success'
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 150
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-coverage
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Generate coverage report
        id: coverage_build
        continue-on-error: true
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build ".#packages.${system}.gammaloop-llvm-coverage" --print-build-logs

      - name: Upload coverage to Codecov
        if: steps.coverage_build.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: result/lcov.info
          fail_ci_if_error: false

      - name: Coverage summary
        if: always()
        run: |
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build status: ${{ steps.coverage_build.outcome }}" >> "$GITHUB_STEP_SUMMARY"

          if [ -f result/lcov.info ]; then
            lines_found=$(awk -F: '/^LF:/{sum+=$2} END{print sum+0}' result/lcov.info)
            lines_hit=$(awk -F: '/^LH:/{sum+=$2} END{print sum+0}' result/lcov.info)
            branches_found=$(awk -F: '/^BRF:/{sum+=$2} END{print sum+0}' result/lcov.info)
            branches_hit=$(awk -F: '/^BRH:/{sum+=$2} END{print sum+0}' result/lcov.info)

            line_pct=$(awk -v h="$lines_hit" -v f="$lines_found" 'BEGIN { if (f > 0) printf "%.2f", (100*h)/f; else printf "0.00" }')
            branch_pct=$(awk -v h="$branches_hit" -v f="$branches_found" 'BEGIN { if (f > 0) printf "%.2f", (100*h)/f; else printf "0.00" }')

            echo "- Lines: ${lines_hit}/${lines_found} (${line_pct}%)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Branches: ${branches_hit}/${branches_found} (${branch_pct}%)" >> "$GITHUB_STEP_SUMMARY"
            echo "- LCOV: \`result/lcov.info\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- LCOV file not found at \`result/lcov.info\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if coverage build failed
        if: steps.coverage_build.outcome != 'success'
        run: exit 1
