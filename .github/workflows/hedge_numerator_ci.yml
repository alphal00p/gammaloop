name: Hedge Numerator CI

on:
  push:
    branches: ["hedge_numerator", "main"]
  pull_request:
    branches: ["hedge_numerator", "main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  partition-config:
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.partitions.outputs.count }}
      list: ${{ steps.partitions.outputs.list }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Set partition configuration
        id: partitions
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          count="$(nix eval --raw .#ci.${system}.partitionCount)"
          list=$(seq 1 "$count" | paste -sd, -)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "list=[$list]" >> $GITHUB_OUTPUT

  build-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Cachix
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=nix-deps-${{ hashFiles('**/flake.lock', '**/Cargo.lock') }}" >> $GITHUB_OUTPUT

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
          key: ${{ steps.cache-key.outputs.key }}-build-deps
          restore-keys: |
            nix-deps-

      - name: Build cargo dependencies and main package
        run: |
          echo "Starting dependency build at $(date)"
          time nix build .#cargoArtifacts --print-build-logs
          echo "Dependencies built at $(date)"
          time nix build .#packages.default --print-build-logs
          echo "Main package built at $(date)"

  clippy:
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
          key: ${{ needs.build-deps.outputs.cache-key }}-clippy
          restore-keys: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Run clippy
        run: |
          echo "Starting clippy at $(date)"
          time nix build .#checks.gammaloop-clippy --print-build-logs
          echo "Clippy completed at $(date)"

  fmt:
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
          key: ${{ needs.build-deps.outputs.cache-key }}-fmt
          restore-keys: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Check formatting
        run: |
          nix build .#checks.gammaloop-fmt --print-build-logs

  test:
    if: needs.build-deps.result == 'success' && needs.partition-config.result == 'success'
    needs: [build-deps, partition-config]
    environment: Cachix
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        # Use multiple runners for test partitioning
        partition: ${{ fromJSON(needs.partition-config.outputs.list) }}
        os: [ubuntu-latest]
        include:
          # Also test on macOS for one partition to ensure cross-platform compatibility
          - os: macos-latest
            partition: 1

    runs-on: ${{ matrix.os }}
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history for better caching
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ matrix.os == 'macos-latest' }}

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
          key: ${{ needs.build-deps.outputs.cache-key }}-test-${{ matrix.partition }}-${{ matrix.os }}
          restore-keys: |
            ${{ needs.build-deps.outputs.cache-key }}-${{ matrix.os }}
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-${{ matrix.os }}-
            nix-deps-

      - name: Run nextest (partition ${{ matrix.partition }})
        run: |
          echo "Starting nextest partition ${{ matrix.partition }} at $(date)"
          echo "Available disk space:"
          df -h
          echo "Available memory:"
          free -h || vm_stat
          time nix build .#checks.gammaloop-nextest-partition-${{ matrix.partition }} --print-build-logs
          echo "Nextest partition ${{ matrix.partition }} completed at $(date)"
        timeout-minutes: 120

      - name: Run doctests
        if: matrix.partition == 1
        run: |
          echo "Starting doctests at $(date)"
          time nix develop --command cargo test --doc --verbose
          echo "Doctests completed at $(date)"
        timeout-minutes: 60

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.partition }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 7

  security-audit:
    if: needs.build-deps.result == 'success'
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
          key: ${{ needs.build-deps.outputs.cache-key }}-audit
          restore-keys: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Run security audit
        run: |
          nix build .#checks.gammaloop-audit --print-build-logs

      - name: Run license check
        run: |
          nix build .#checks.gammaloop-deny --print-build-logs

  docs:
    if: needs.build-deps.result == 'success'
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
          key: ${{ needs.build-deps.outputs.cache-key }}-docs
          restore-keys: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Build documentation
        run: |
          nix build .#checks.gammaloop-doc --print-build-logs

  coverage:
    if: needs.build-deps.result == 'success'
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 150
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
          key: ${{ needs.build-deps.outputs.cache-key }}-coverage
          restore-keys: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Generate coverage report
        run: |
          nix build .#packages.gammaloop-llvm-coverage --print-build-logs

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: result/lcov.info
          fail_ci_if_error: false
