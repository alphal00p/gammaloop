name: crane-workflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SYMBOLICA_LICENSE: ${{ secrets.SYMBOLICA_LICENSE }}

jobs:
  partition-config:
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.partitions.outputs.count }}
      list: ${{ steps.partitions.outputs.list }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set partition configuration
        id: partitions
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          count="$(nix eval --raw .#ci.${system}.partitionCount)"
          list=$(seq 1 "$count" | paste -sd, -)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "list=[$list]" >> $GITHUB_OUTPUT

  build-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Cachix
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=nix-deps-${{ hashFiles('**/flake.lock', '**/Cargo.lock') }}" >> $GITHUB_OUTPUT

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ steps.cache-key.outputs.key }}-build-deps
          restore-prefixes-first-match: |
            nix-deps-

      - name: Build cargo dependencies
        run: |
          echo "Starting dependency build at $(date)"
          time nix build .#cargoArtifacts --print-build-logs
          echo "Dependencies built at $(date)"

  build-deps-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    environment: Cachix
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: true

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=nix-deps-${{ hashFiles('**/flake.lock', '**/Cargo.lock') }}" >> $GITHUB_OUTPUT

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ steps.cache-key.outputs.key }}-build-deps-macos
          restore-prefixes-first-match: |
            nix-deps-

      - name: Build cargo dependencies (macOS)
        run: |
          echo "Starting dependency build at $(date)"
          time nix build .#cargoArtifacts --print-build-logs
          echo "Dependencies built at $(date)"

  package:
    if: needs.build-deps.result == 'success'
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: Cachix
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-package
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Build main package
        run: |
          echo "Starting package build at $(date)"
          time nix build .#default --print-build-logs
          echo "Package build completed at $(date)"

  clippy:
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-clippy
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Run clippy
        id: clippy_check
        continue-on-error: true
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          echo "Starting clippy at $(date)"
          set -o pipefail
          time nix build ".#checks.${system}.gammaloop-clippy" --print-build-logs 2>&1 | tee clippy.raw.log
          perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' clippy.raw.log > clippy.log
          echo "Clippy completed at $(date)"

      - name: Clippy summary
        if: always()
        run: |
          error_count=0
          warning_count=0
          diag_count=0
          if [ -f clippy.log ]; then
            error_count=$(rg -N "^[[:space:]]*error(\\[[^]]+\\])?:[[:space:]]*" clippy.log | wc -l | tr -d ' ')
            warning_count=$(rg -N "^[[:space:]]*warning:[[:space:]]*" clippy.log | wc -l | tr -d ' ')
            awk '
              function flush_diag() {
                if (diag_level != "") {
                  loc = (diag_loc == "" ? "-" : diag_loc)
                  msg = diag_msg
                  gsub(/\|/, "\\|", loc)
                  gsub(/\|/, "\\|", msg)
                  print "| " diag_level " | " loc " | " msg " |"
                  diag_count += 1
                  if (diag_count >= 20) exit
                }
                diag_level = ""
                diag_msg = ""
                diag_loc = ""
              }
              BEGIN {
                diag_count = 0
                diag_level = ""
                diag_msg = ""
                diag_loc = ""
              }
              {
                if ($0 ~ /^[[:space:]]*(error(\[[^]]+\])?:|warning:)/) {
                  flush_diag()
                  if ($0 ~ /^[[:space:]]*error/) {
                    diag_level = "error"
                  } else {
                    diag_level = "warning"
                  }
                  diag_msg = $0
                  sub(/^[[:space:]]*(error(\[[^]]+\])?:|warning:)[[:space:]]*/, "", diag_msg)
                  next
                }
                if (diag_level != "" && diag_loc == "" && $0 ~ /^[[:space:]]*-->[[:space:]]+/) {
                  diag_loc = $0
                  sub(/^[[:space:]]*-->[[:space:]]*/, "", diag_loc)
                  next
                }
              }
              END {
                flush_diag()
              }
            ' clippy.log > clippy_diagnostics.md
            if [ -s clippy_diagnostics.md ]; then
              diag_count=$(rg -N "^\\| (error|warning) \\|" clippy_diagnostics.md | wc -l | tr -d ' ')
            fi
          fi

          if [ "${{ steps.clippy_check.outcome }}" = "success" ]; then
            echo "### Clippy" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: PASS" >> "$GITHUB_STEP_SUMMARY"
            echo "- Command: \`nix build .#checks.\${system}.gammaloop-clippy --print-build-logs\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Errors: ${error_count}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Warnings: ${warning_count}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Clippy" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: FAIL" >> "$GITHUB_STEP_SUMMARY"
            echo "- Command: \`nix build .#checks.\${system}.gammaloop-clippy --print-build-logs\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Errors: ${error_count}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Warnings: ${warning_count}" >> "$GITHUB_STEP_SUMMARY"
            if [ "${diag_count}" -gt 0 ] && [ -f clippy_diagnostics.md ]; then
              echo "- Diagnostics shown: ${diag_count} (first 20)" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "| Level | Location | Message |" >> "$GITHUB_STEP_SUMMARY"
              echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
              cat clippy_diagnostics.md >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "- See the 'Run clippy' step logs for full details." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if clippy check failed
        if: steps.clippy_check.outcome != 'success'
        run: exit 1

  fmt:
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-fmt
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Check formatting
        id: fmt_check
        continue-on-error: true
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build ".#checks.${system}.gammaloop-fmt" --print-build-logs

      - name: Formatting summary
        if: always()
        run: |
          if [ "${{ steps.fmt_check.outcome }}" = "success" ]; then
            echo "### Formatting" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: PASS" >> "$GITHUB_STEP_SUMMARY"
            echo "- Command: \`nix build .#checks.\${system}.gammaloop-fmt --print-build-logs\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Formatting" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: FAIL" >> "$GITHUB_STEP_SUMMARY"
            echo "- Command: \`nix build .#checks.\${system}.gammaloop-fmt --print-build-logs\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- See the 'Check formatting' step logs for details." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if formatting check failed
        if: steps.fmt_check.outcome != 'success'
        run: exit 1

  test-linux:
    if: needs.build-deps.result == 'success' && needs.partition-config.result == 'success'
    needs: [build-deps, partition-config]
    environment: Cachix
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        partition: ${{ fromJSON(needs.partition-config.outputs.list) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            extra-sandbox-paths = /tmp/symbolica_license

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Prepare Symbolica license file
        run: |
          install -m 600 /dev/null /tmp/symbolica_license
          printf '%s' "${SYMBOLICA_LICENSE}" > /tmp/symbolica_license

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-test-${{ matrix.partition }}-ubuntu-latest
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}-ubuntu-latest
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-ubuntu-latest-
            nix-deps-

      - name: Run nextest (partition ${{ matrix.partition }})
        run: |
          echo "Starting nextest partition ${{ matrix.partition }} at $(date)"
          echo "Available disk space:"
          df -h
          echo "Available memory:"
          free -h || vm_stat
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          time nix build ".#checks.${system}.gammaloop-nextest-partition-${{ matrix.partition }}" --print-build-logs
          echo "Nextest partition ${{ matrix.partition }} completed at $(date)"
        timeout-minutes: 120

      - name: Run doctests
        if: matrix.partition == 1
        run: |
          echo "Starting doctests at $(date)"
          time nix develop --command cargo test --doc --verbose
          echo "Doctests completed at $(date)"
        timeout-minutes: 60

  test-macos:
    if: needs.build-deps-macos.result == 'success' && needs.partition-config.result == 'success'
    needs: [build-deps-macos, partition-config]
    environment: Cachix
    permissions:
      contents: read
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            extra-sandbox-paths = /tmp/symbolica_license

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: true

      - name: Prepare Symbolica license file
        run: |
          install -m 600 /dev/null /tmp/symbolica_license
          printf '%s' "${SYMBOLICA_LICENSE}" > /tmp/symbolica_license

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps-macos.outputs.cache-key }}-test-1-macos-latest
          restore-prefixes-first-match: |
            ${{ needs.build-deps-macos.outputs.cache-key }}-macos-latest
            ${{ needs.build-deps-macos.outputs.cache-key }}
            nix-deps-macos-latest-
            nix-deps-

      - name: Run nextest (partition 1)
        run: |
          echo "Starting nextest partition 1 at $(date)"
          echo "Available disk space:"
          df -h
          echo "Available memory:"
          vm_stat
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          time nix build ".#checks.${system}.gammaloop-nextest-partition-1" --print-build-logs
          echo "Nextest partition 1 completed at $(date)"
        timeout-minutes: 120

      - name: Run doctests
        run: |
          echo "Starting doctests at $(date)"
          time nix develop --command cargo test --doc --verbose
          echo "Doctests completed at $(date)"
        timeout-minutes: 60

  docs:
    if: needs.build-deps.result == 'success'
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-docs
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Build documentation
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build ".#checks.${system}.gammaloop-doc" --print-build-logs

  coverage:
    if: needs.build-deps.result == 'success'
    needs: build-deps
    runs-on: ubuntu-latest
    timeout-minutes: 150
    environment: Cachix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: gammaloop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ needs.build-deps.outputs.cache-key }}-coverage
          restore-prefixes-first-match: |
            ${{ needs.build-deps.outputs.cache-key }}
            nix-deps-

      - name: Generate coverage report
        id: coverage_build
        continue-on-error: true
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build ".#packages.${system}.gammaloop-llvm-coverage" --print-build-logs

      - name: Upload coverage to Codecov
        if: steps.coverage_build.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: result/lcov.info
          fail_ci_if_error: false

      - name: Coverage summary
        if: always()
        run: |
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build status: ${{ steps.coverage_build.outcome }}" >> "$GITHUB_STEP_SUMMARY"

          if [ -f result/lcov.info ]; then
            lines_found=$(awk -F: '/^LF:/{sum+=$2} END{print sum+0}' result/lcov.info)
            lines_hit=$(awk -F: '/^LH:/{sum+=$2} END{print sum+0}' result/lcov.info)
            branches_found=$(awk -F: '/^BRF:/{sum+=$2} END{print sum+0}' result/lcov.info)
            branches_hit=$(awk -F: '/^BRH:/{sum+=$2} END{print sum+0}' result/lcov.info)

            line_pct=$(awk -v h="$lines_hit" -v f="$lines_found" 'BEGIN { if (f > 0) printf "%.2f", (100*h)/f; else printf "0.00" }')
            branch_pct=$(awk -v h="$branches_hit" -v f="$branches_found" 'BEGIN { if (f > 0) printf "%.2f", (100*h)/f; else printf "0.00" }')

            echo "- Lines: ${lines_hit}/${lines_found} (${line_pct}%)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Branches: ${branches_hit}/${branches_found} (${branch_pct}%)" >> "$GITHUB_STEP_SUMMARY"
            echo "- LCOV: \`result/lcov.info\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- LCOV file not found at \`result/lcov.info\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if coverage build failed
        if: steps.coverage_build.outcome != 'success'
        run: exit 1
