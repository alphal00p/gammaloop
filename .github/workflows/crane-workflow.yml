name: crane-workflow

on: [push, pull_request, merge_group]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SYMBOLICA_LICENSE: ${{ secrets.SYMBOLICA_LICENSE }}

permissions:
  contents: read
  id-token: write

jobs:
  nix-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Resolve Nix system
        id: nix_meta
        shell: bash
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          echo "system=${system}" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: nix build ".#checks.${{ steps.nix_meta.outputs.system }}.gammaloop-fmt" --print-build-logs

      - name: Clippy clinnet
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-clinnet" --print-build-logs

      - name: Clippy linnet
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-linnet" --print-build-logs

      - name: Clippy spenso-macros
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-spenso-macros" --print-build-logs

      - name: Clippy vakint
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-vakint" --print-build-logs

      - name: Clippy linnest
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-linnest" --print-build-logs

      - name: Clippy linnet-py
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-linnet-py" --print-build-logs

      - name: Clippy spenso
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-spenso" --print-build-logs

      - name: Clippy idenso
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-idenso" --print-build-logs

      - name: Clippy spenso-hep-lib
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-spenso-hep-lib" --print-build-logs

      - name: Clippy spynso3
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-spynso3" --print-build-logs

      - name: Clippy gammalooprs
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-gammalooprs" --print-build-logs

      - name: Clippy gammaloop-api
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.clippy-gammaloop-api" --print-build-logs

      - name: Test clinnet
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-clinnet" --print-build-logs

      - name: Test linnet
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-linnet" --print-build-logs

      - name: Test spenso-macros
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-spenso-macros" --print-build-logs

      - name: Test vakint
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-vakint" --print-build-logs

      - name: Test linnest
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-linnest" --print-build-logs

      - name: Test linnet-py
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-linnet-py" --print-build-logs

      - name: Test spenso
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-spenso" --print-build-logs

      - name: Test idenso
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-idenso" --print-build-logs

      - name: Test spenso-hep-lib
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-spenso-hep-lib" --print-build-logs

      - name: Test spynso3
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-spynso3" --print-build-logs

      - name: Test gammalooprs
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-gammalooprs" --print-build-logs

      - name: Test gammaloop-api
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-gammaloop-api" --print-build-logs

      - name: Test integration
        run: nix build --impure ".#checks.${{ steps.nix_meta.outputs.system }}.nextest-integration" --print-build-logs

      - name: Run doctests
        run: nix develop --command cargo test --doc --verbose

      - name: Build documentation
        run: nix build ".#checks.${{ steps.nix_meta.outputs.system }}.gammaloop-doc" --print-build-logs

      - name: Generate coverage report
        run: nix build ".#packages.${{ steps.nix_meta.outputs.system }}.gammaloop-llvm-coverage" --print-build-logs

      - name: Build package
        id: package_build
        continue-on-error: true
        run: nix build .#default --print-build-logs

      - name: Upload coverage to Codecov
        if: success() && hashFiles('result/lcov.info') != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: result/lcov.info
          fail_ci_if_error: false

      - name: Package summary
        if: always()
        run: |
          echo "### Package" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build status: ${{ steps.package_build.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.package_build.outcome }}" != "success" ]; then
            echo "- Package build is non-blocking in this workflow." >> "$GITHUB_STEP_SUMMARY"
          fi
