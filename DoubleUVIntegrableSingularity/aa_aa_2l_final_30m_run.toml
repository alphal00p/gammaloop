[cli_settings]
[cli_settings.state]
name = "aa_aa_2L_final_30m"
folder = "/tmp/gammaloop_aa_aa_2l_final_run_state"

[cli_settings.global.n_cores]
integrate = 20

[[command_blocks]]
name = "final_set_model_parameters"
commands = [
  "set model MT=173.0",
  "set model WT=0.0",
  "set model ymt=173.0",
  "set model aS=0.118",
  "set model aEWM1=137.036",
  "set model Gf=1.166390e-05",
  "set model MZ=91.188",
]

[[command_blocks]]
name = "final_set_kinematics_a"
commands = [
  """set process string '
    [kinematics.externals]
    type = "constant"
    [kinematics.externals.data]
    momenta = [
        [ 86.5, 0.0, 0.0, 86.5 ],
        [ 86.5, 0.0, 0.0, -86.5 ],
        [ 86.5, 0.0, -79.27855952273603, -34.6 ],
        "dependent"
    ]
    '""",
]

[[command_blocks]]
name = "final_integrate_30m"
commands = [
  "remove processes -p aa_aa -i 2L_muv_22p797",
  "remove processes -p aa_aa -i 2L_muv_91p188",
  "remove processes -p aa_aa -i 2L_muv_364p752",
  "remove processes -p aa_aa -i 2L_m_uv_UP",
  "remove processes -p aa_aa -i 2L_m_uv_DOWN",
  "remove processes -p aa_aa -i 2L_mu_r_UP",
  "remove processes -p aa_aa -i 2L_mu_r_DOWN",
  "run final_set_model_parameters",
  "run final_set_kinematics_a",
  "set process -p aa_aa kv kinematics.externals.data.helicities=[+1,-1,+1,-1]",
  "set process -p aa_aa kv general.mu_r=91.188",
  "set process -p aa_aa kv integrator.n_increase=0 integrator.n_start=1000000 integrator.n_max=25000000 integrator.seed=1337 integrator.integrated_phase=\"imag\" integrator.target_relative_accuracy=1.0e-2",
  "set process -p aa_aa -i 2L kv general.m_uv=9.188",
  """set process -p aa_aa string '
        [sampling]
        graphs = "monte_carlo"
        orientations = "summed"
        lmb_multichanneling = true
        lmb_channels = "summed"
        lmb_channel_weight = "inverse_jacobian"
        coordinate_system = "spherical"
        mapping = "linear"
        b = 1.0
    '""",
  """integrate -p aa_aa -i 2L
             --n-cores 20
             --workspace-path /tmp/aa_aa_2l_full_amplitude_final_30m_workspace
             --renderer tabled
             --batch-size 10000
             --show-phase both
             --show-max-weight-info
             --show-top-discrete-grid
             --show-discrete-contributions-sum
             --write-results-for-each-iteration
             --restart
    """,
]
