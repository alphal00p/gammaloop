[[command_blocks]]
name = "setup_maxweight_inspect"
commands = [
  "run set_model_parameters",
  "run set_kinematics_a",
  "set process -p aa_aa kv kinematics.externals.data.helicities=[+1,-1,+1,-1] general.mu_r=91.188 general.m_uv=9.188",
  """set process -p aa_aa string '
        [sampling]
        graphs = "monte_carlo"
        orientations = "summed"
        lmb_multichanneling = true
        lmb_channels = "summed"
        lmb_channel_weight = "inverse_jacobian"
        coordinate_system = "spherical"
        mapping = "linear"
        b = 1.0
    '""",
]

[[command_blocks]]
name = "inspect_current_max_weights"
commands = [
  "run setup_maxweight_inspect",
  "inspect -p aa_aa -i 2L -d 3 -x 0.9992159405808112 0.6868444838619521 0.6429740315399803 0.9990699795198853 0.11418044330903651 0.3953319419540728",
  "inspect -p aa_aa -i 2L -d 4 -x 0.9995215227215548 0.5787928959151282 0.22059957686624845 0.9999299728315765 0.8989299227500787 0.42030419319463375",
