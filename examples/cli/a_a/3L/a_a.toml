[[command_blocks]]
name = "integrate_diagnostics_ff_pi"
commands = [
  "run set_model_parameters",
  "run set_kinematics",
#  "run set_kinematics_onshell",
#  "run set_physical_kinematics",
  "remove processes -p ff_pi -i 3L_m_uv_x2",
  "remove processes -p ff_pi -i 3L_m_uv_x4",
  "remove processes -p ff_pi -i 3L_m_uv_div2",
  "remove processes -p ff_pi -i 3L_m_uv_div4",
  "remove processes -p ff_pi -i 3L_mu_r_x2",
  "remove processes -p ff_pi -i 3L_mu_r_x4",
  "remove processes -p ff_pi -i 3L_mu_r_div2",
  "remove processes -p ff_pi -i 3L_mu_r_div4",
  "duplicate integrand -p ff_pi -i 3L --output_process_name ff_pi --output_integrand_name 3L_m_uv_x2",
  "set process -p ff_pi -i 3L_m_uv_x2 kv general.m_uv=2.0",
  "duplicate integrand -p ff_pi -i 3L --output_process_name ff_pi --output_integrand_name 3L_m_uv_x4",
  "set process -p ff_pi -i 3L_m_uv_x4 kv general.m_uv=4.0",
  "duplicate integrand -p ff_pi -i 3L --output_process_name ff_pi --output_integrand_name 3L_m_uv_div2",
  "set process -p ff_pi -i 3L_m_uv_div2 kv general.m_uv=0.5",
  "duplicate integrand -p ff_pi -i 3L --output_process_name ff_pi --output_integrand_name 3L_m_uv_div4",
  "set process -p ff_pi -i 3L_m_uv_div4 kv general.m_uv=0.25",
  "duplicate integrand -p ff_pi -i 3L --output_process_name ff_pi --output_integrand_name 3L_mu_r_x2",
  "set process -p ff_pi -i 3L_mu_r_x2 kv general.mu_r=182.376",
  "duplicate integrand -p ff_pi -i 3L --output_process_name ff_pi --output_integrand_name 3L_mu_r_x4",
  "set process -p ff_pi -i 3L_mu_r_x4 kv general.mu_r=364.752",
  "duplicate integrand -p ff_pi -i 3L --output_process_name ff_pi --output_integrand_name 3L_mu_r_div2",
  "set process -p ff_pi -i 3L_mu_r_div2 kv general.mu_r=45.594",
  "duplicate integrand -p ff_pi -i 3L --output_process_name ff_pi --output_integrand_name 3L_mu_r_div4",
  "set process -p ff_pi -i 3L_mu_r_div4 kv general.mu_r=22.797",
  """set process -p ff_pi string '
    [integrator]
    n_increase = 0
    n_start = 100000
    n_max = 1000000000
    seed = 1337
    integrated_phase = "real"
    target_relative_accuracy = 1.0e-2

    [stability]
    check_on_norm = true
    escalate_if_exact_zero = true
    loop_momenta_norm_escalation_factor = 100.0
    rotation_axis = [
      { type = "x" },
    ]

    [[stability.levels]]
    precision = "Double"
    required_precision_for_re = 1.0e-5
    required_precision_for_im = 1.0e-5
    escalate_for_large_weight_threshold = 0.99

    [[stability.levels]]
    precision = "Quad"
    required_precision_for_re = 1.0e-5
    required_precision_for_im = 1.0e-5
    escalate_for_large_weight_threshold = -1.0

    [[stability.levels]]
    precision = "Arb"
    required_precision_for_re = 1.0e-7
    required_precision_for_im = 1.0e-7
    escalate_for_large_weight_threshold = -1.0

    [sampling]
    graphs = "monte_carlo"
    orientations = "summed"
    lmb_multichanneling = true
    lmb_channels = "summed"
    lmb_channel_weight = "inverse_jacobian"
    coordinate_system = "spherical"
    mapping = "linear"
    b = 1.0
    '""",
#    -p ff_pi -i 3L_mu_r_x2
#    -p ff_pi -i 3L_mu_r_x4
#    -p ff_pi -i 3L_mu_r_div2
#    -p ff_pi -i 3L_mu_r_div4
# --uncorrelated
  """integrate -p ff_pi -i 3L
             -p ff_pi -i 3L_m_uv_x2
             -p ff_pi -i 3L_m_uv_x4
             -p ff_pi -i 3L_m_uv_div2
             -p ff_pi -i 3L_m_uv_div4
             --n-cores 10
             --workspace-path ./examples/cli/a_a/3L/workspaces/diagnostics_ff_pi
             --renderer ratatui
             --batch-size 1000
             --show-phase both
             --show-max-weight-info
             --show-top-discrete-grid
             --show-discrete-contributions-sum
             --write-results-for-each-iteration
             --restart
    """,
]

[[command_blocks]]
name = "set_model_parameters"
commands = [
  "set model MB=4.7",
  "set model ymb=4.7",
  "set model WT=0.0",
  "set model aS=0.118",
  "set model aEWM1=137.036",
  "set model Gf=1.166390e-05",
  "set model MZ=91.188",
]

[[command_blocks]]
name = "set_kinematics"
commands = [
  """set process string '
    [kinematics.externals]
    type = "constant"
    [kinematics.externals.data]
    momenta = [
      [ 0.0, 0.0, 0.0, 1.0 ],
      "dependent"
    ]
    helicities = [ +1, +1 ]
    '""",
]

[[command_blocks]]
name = "set_physical_kinematics"
commands = [
  """set process string '
    [kinematics.externals]
    type = "constant"
    [kinematics.externals.data]
    momenta = [
      [ 1.0, 0.0, 0.0, 0.0 ],
      "dependent"
    ]
    helicities = [ +1, +1 ]
    '""",
]

[[command_blocks]]
name = "set_physical_kinematics_B"
commands = [
  """set process string '
    [kinematics.externals]
    type = "constant"
    [kinematics.externals.data]
    momenta = [
      [ 10.0, 0.0, 0.0, 0.0 ],
      "dependent"
    ]
    helicities = [ +1, +1 ]
    '""",
]

[[command_blocks]]
name = "set_kinematics_onshell"
commands = [
  """set process string '
