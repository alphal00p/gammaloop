commands = []

[cli_settings]
override_state = true

[cli_settings.state]
name = "a_a_3L"
folder = "./examples/cli/a_a/3L/gammaloop_state"

[cli_settings.global]
display_directive = "info"
logfile_directive = "info"

[cli_settings.global.log_style]
include_fields = true
full_line_source = true
log_format = "Full"
short_timestamp = true

[cli_settings.global.generation]
override_lmb_heuristics = false

[cli_settings.global.generation.uv]
softct = false
generate_integrated = true
subtract_uv = true
final_integrand = "ThreeD"
add_marker = false
keep_marker = false

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = false
compile = false
summed = false
summed_function_map = true
horner_iterations = 5
cpe_iterations = 50

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = true
check_esurface_at_generation = false

[cli_settings.global.generation.compile]
compilation_mode = "assembly"
optimization_level = "O3"
fast_math = true
unsafe_math = true
custom = []

[cli_settings.global.generation.tropical_subgraph_table]
panic_on_fail = true
disable_tropical_generation = false

[cli_settings.global.n_cores]
feyngen = 10
generate = 10
compile = 1
integrate = 10

[[command_blocks]]
name = "generate_diagrams"
commands = [
  "import model sm-default.json",
  "set global kv global.n_cores.feyngen=10",
  "remove processes -p ff_pi",
  "remove processes -p ff_pi_0",
  """generate amp a > a | a b g ghg QCD==4 QED==2 [{3}]
        --numerator-grouping group_identical_graphs_up_to_scalar_rescaling
        --number-of-samples-for-numerator-comparisons 1
        --fully-numerical-substitution-when-comparing-numerators=true
        --compare-canonized-numerator=false
        --global-prefactor-projector '(1/(3*(gammalooprs::Q(0,spenso::mink(4,1))*gammalooprs::Q(0,spenso::mink(4,1)))))*(spenso::g(spenso::mink(4,gammalooprs::hedge(0)),spenso::mink(4,gammalooprs::hedge(1))) - gammalooprs::Q(0,spenso::mink(4,gammalooprs::hedge(0)))*gammalooprs::Q(0,spenso::mink(4,gammalooprs::hedge(1)))/(gammalooprs::Q(0,spenso::mink(4,1))*gammalooprs::Q(0,spenso::mink(4,1))))'
        --global-prefactor-num "-1𝑖"
        -p ff_pi -i 3L --only-diagrams""",
  """generate amp a > a | a b g ghg QCD==4 QED==2 [{3}]
        --numerator-grouping group_identical_graphs_up_to_scalar_rescaling
        --number-of-samples-for-numerator-comparisons 1
        --fully-numerical-substitution-when-comparing-numerators=true
        --compare-canonized-numerator=false
        --global-prefactor-projector '(-1/(4*gammalooprs::Q(0,spenso::cind(0))^4))*(gammalooprs::Q(0,spenso::mink(4,gammalooprs::hedge(0))) - 2*gammalooprs::Q3(0,spenso::mink(4,gammalooprs::hedge(0))))*(gammalooprs::Q(0,spenso::mink(4,gammalooprs::hedge(1))) - 2*gammalooprs::Q3(0,spenso::mink(4,gammalooprs::hedge(1))))'
        --global-prefactor-num "-1𝑖"
        -p ff_pi_0 -i 3L --only-diagrams""",
  "save dot ./examples/cli/a_a/3L/graphs",
  "save state -o",
]

[[command_blocks]]
name = "generate_integrands"
commands = [
  "generate existing -p ff_pi -i 3L",
  "generate existing -p ff_pi_0 -i 3L",
  "save state -o",
]

[[command_blocks]]
name = "integrate_ff_pi"
commands = [
  "run set_model_parameters",
  "run set_kinematics",
#  "run set_kinematics_onshell",
#  "run set_physical_kinematics",
  """set process -p ff_pi string '
    [integrator]
    n_increase = 0
    n_start = 100000
    n_max = 1000000000
    seed = 1337
    integrated_phase = "real"
    target_relative_accuracy = 1.0e-2

    [stability]
    check_on_norm = false
    escalate_if_exact_zero = false
    loop_momenta_norm_escalation_factor = -1.0
    rotation_axis = [
      { type = "z" },
      { type = "x" },
      { type = "y" },
    ]

    [[stability.levels]]
    precision = "Double"
    required_precision_for_re = 1.0e-7
    required_precision_for_im = 1.0e-7
    escalate_for_large_weight_threshold = 0.5

    [[stability.levels]]
    precision = "Quad"
    required_precision_for_re = 1.0e-7
    required_precision_for_im = 1.0e-7
    escalate_for_large_weight_threshold = -1.0

    [[stability.levels]]
    precision = "Arb"
    required_precision_for_re = 1.0e-7
    required_precision_for_im = 1.0e-7
    escalate_for_large_weight_threshold = -1.0

    [sampling]
    graphs = "monte_carlo"
    orientations = "summed"
    lmb_multichanneling = true
    lmb_channels = "summed"
    lmb_channel_weight = "inverse_jacobian"
    coordinate_system = "spherical"
    mapping = "linear"
    b = 1.0
    '""",
  """integrate -p ff_pi -i 3L
             --n-cores 10
             --workspace-path ./examples/cli/a_a/3L/workspaces/ff_pi
             --renderer ratatui
             --batch-size 1000
             --show-phase both
             --show-max-weight-info
             --show-top-discrete-grid
             --show-discrete-contributions-sum
             --write-results-for-each-iteration
             --restart
    """,
]

