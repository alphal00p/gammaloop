commands = [
  "inspect -p $(process:bench) -i $(integrand:default) -x $(x0:0.13) $(x1:0.27) $(x2:0.41) $(x3:0.58) $(x4:0.72) $(x5:0.86) $(x6:0.19) $(x7:0.33) $(x8:0.47) $(x9:0.61) $(x10:0.75) $(x11:0.89) $(minimal_integrand:) --bench $(bench_duration:10.0) --json-output $(json_output:inspect_bench.json)",
