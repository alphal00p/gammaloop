]

[[command_blocks]]
name = "bench_point18"
commands = [
  "inspect -p $(process:bench) -i $(integrand:default) -x $(x0:0.13) $(x1:0.27) $(x2:0.41) $(x3:0.58) $(x4:0.72) $(x5:0.86) $(x6:0.19) $(x7:0.33) $(x8:0.47) $(x9:0.61) $(x10:0.75) $(x11:0.89) $(x12:0.11) $(x13:0.24) $(x14:0.37) $(x15:0.52) $(x16:0.68) $(x17:0.83) $(minimal_integrand:) --bench $(bench_duration:10.0) --json-output $(json_output:inspect_bench.json)",
]

[[command_blocks]]
name = "set_model_parameters"
commands = [
  "set model MT=173.0",
  "set model WT=0.0",
  "set model ymt=173.0",
  "set model aS=0.118",
  "set model aEWM1=132.507",
  "set model Gf=1.166390e-05",
  "set model MZ=91.188",
]

[default_runtime_settings.kinematics]
e_cm = 1000.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [
    [
        1000.0,
        0.0,
        0.0,
        0.0,
    ],
]
helicities = [
    "summed_averaged",
]

[default_runtime_settings.general]
evaluator_method = "SingleParametric"
enable_cache = false
debug_cache = false
generate_events = false
store_additional_weights_in_event = false
integral_unit = "none"
mu_r = 91.188
m_uv = 91.188

[default_runtime_settings.subtraction]
disable_threshold_subtraction = true
