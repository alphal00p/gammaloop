[[command_blocks]]
name = "integrate_box_above_and_below_threshold"
commands = [

	"""set process -p box -i scalar_box_above_thres string '
    [sampling]
    graphs = "monte_carlo"
    orientations = "monte_carlo"
    lmb_multichanneling = true
    lmb_channels = "summed"
    coordinate_system = "spherical"
    mapping = "linear"
    b = 1.0
    '""",

	"""set process -p box -i scalar_box_below_thres string '
    [sampling]
    graphs = "monte_carlo"
    orientations = "monte_carlo"
    lmb_multichanneling = true
    lmb_channels = "summed"
    coordinate_system = "spherical"
    mapping = "linear"
    b = 1.0
    '""",

    "set process -p box -i scalar_box_above_thres kv integrator.target_relative_accuracy=0.001 integrator.target_absolute_accuracy=1.0e-9",
    "set process -p box -i scalar_box_above_thres kv integrator.n_increase=0 integrator.n_start=5000000 integrator.n_max=500000000 integrator.seed=1337",
    # --show-max-weight-info-for-discrete-bins
	# --batch-size 100000
	# --no-stream-iterations
	# --show-max-weight-info-for-discrete-bins
	# --no-stream-iterations	
	#			 --show-phase both
	#			 --show-top-discrete-grid
	#			 --show-discrete-contributions-sum
	#			 --sort-contributions integral
	#			 --show-max-weight-info
	#			 --renderer ratatui
	"""integrate -p box -i scalar_box_above_thres -p box -i scalar_box_below_thres --n-cores 5
                 --target box@scalar_box_above_thres=7.841453335814232e-6,7.410964890068131e-5 box@scalar_box_below_thres=6.626887713315055e-05,0.0
				 --renderer ratatui
				 --batch-size 10000
				 --show-phase both
				 --show-max-weight-info
				 --show-top-discrete-grid
				 --show-discrete-contributions-sum
                 --restart
    """,
]

[default_runtime_settings.sampling]
graphs = "summed"
orientations = "summed"
lmb_multichanneling = false
lmb_channels = "summed"
coordinate_system = "spherical"
mapping = "linear"
b = 1.0

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = true
compile = false
summed = false
summed_function_map = true

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = true
check_esurface_at_generation = false

[default_runtime_settings.subtraction]
disable_threshold_subtraction = false
