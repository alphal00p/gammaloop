[cli_settings]
[cli_settings.state]
folder = "./examples/cli/scalar_topologies/state"
name = "multi_scalar_integrand"

[[command_blocks]]
name = "generate"
commands = [

    "import model scalars-default.json",

    "reset processes",
    "generate amp scalar_1 > scalar_0 scalar_0 [{1}] --allowed-vertex-interactions V_3_SCALAR_022 V_3_SCALAR_122 -p triangle -i scalar_tri_below_thres --global-prefactor-num '1𝑖'",
    "generate amp scalar_0 scalar_0 > scalar_0 scalar_0 [{1}] --allowed-vertex-interactions V_3_SCALAR_022 -p box -i scalar_box_below_thres --select-graphs GL0",
	"generate",
    "duplicate integrand -p triangle -i scalar_tri_below_thres --output_process_name triangle --output_integrand_name scalar_tri_above_thres",
    "duplicate integrand -p box -i scalar_box_below_thres --output_process_name box --output_integrand_name scalar_box_above_thres",
    "save dot",
    "save standalone",

    "set model mass_scalar_2=2.0",

    """set process -p triangle -i scalar_tri_below_thres string '
[kinematics.externals]
type = "constant"

[kinematics.externals.data]
momenta = [
   	[1.0, 0.0, 0.0,  0.0],
   	[0.5, 0.0, 0.0, -0.5],
    "dependent"
]
helicities = [
    0,
	0,
	0,
]
    '""",

    """set process -p triangle -i scalar_tri_above_thres string '
[kinematics.externals]
type = "constant"

[kinematics.externals.data]
momenta = [
   	[10.0, 0.0, 0.0,  0.0],
   	[5.0 , 0.0, 0.0, -5.0],
    "dependent"
]
helicities = [
    0,
	0,
	0,
]
    '""",

	"""set process -p box -i scalar_box_below_thres string '
[kinematics.externals]
type = "constant"

[kinematics.externals.data]
momenta = [
   	[0.3, 0.0, 0.0,  0.3],
   	[0.3, 0.0, 0.0, -0.3],
   	[0.3, 0.3, 0.0,  0.0],
    "dependent"
]
helicities = [
    0,
	0,
	0,
	0,
]
    '""",

	"""set process -p box -i scalar_box_above_thres string '
[kinematics.externals]
type = "constant"

[kinematics.externals.data]
momenta = [
   	[3.0, 0.0, 0.0,  3.0],
   	[3.0, 0.0, 0.0, -3.0],
   	[3.0, 0.0, 3.0,  0.0],
    "dependent"
]
helicities = [
    0,
	0,
	0,
	0,
]
    '""",

    "save state -o",

]

