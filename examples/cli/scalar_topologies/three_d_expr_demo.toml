commands = []

[cli_settings]
[cli_settings.state]
folder = "./examples/cli/scalar_topologies/three_d_expr_demo_state"
name = "three_d_expr_demo"

[cli_settings.global.generation]
uniform_numerator_sampling_scale = "beyond_quadratic"

[default_runtime_settings.general]
numerator_interpolation_scale = 2.0

[[command_blocks]]
name = "demo"
commands = [
  "import model scalars-default.json",
  "remove processes",

  """import graphs string '
digraph three_d_expr_box_pow3 {
  node [num="1"];
  num=1;
  overall_factor=1;
  ext [style=invis];

  ext -> B:0 [particle="scalar_0" id=0 name="p1"];
  ext -> C:1 [particle="scalar_0" id=1 name="p2"];
  ext -> D:2 [particle="scalar_0" id=2 name="p3"];
  A:3 -> ext [particle="scalar_0" id=3 name="p4"];

  A -> B [particle="scalar_1" id=4 name="q0" lmb_id=0 num="Q(4,spenso::cind(0))"];
  B -> C [particle="scalar_1" id=5 name="q1" num="Q(5,spenso::cind(0))"];
  C -> D [particle="scalar_1" id=6 name="q2"];
  D -> E [particle="scalar_1" id=7 name="q3" num="Q(7,spenso::cind(0))^4"];
  E -> F [particle="scalar_1" id=8 name="q4"];
  F -> A [particle="scalar_1" id=9 name="q5"];
}
' -p three_d_expr_box_pow3 -i default -o""",

  "save state -o",

  "3Drep validate -p three_d_expr_box_pow3 -i default -g 0 --json-out ./examples/cli/scalar_topologies/three_d_expr_demo_workspace/validate.json",

  "3Drep build -p three_d_expr_box_pow3 -i default -g 0 --representation ltd --clean --workspace-path ./examples/cli/scalar_topologies/three_d_expr_demo_workspace",

  "3Drep build -p three_d_expr_box_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --no-pretty --workspace-path ./examples/cli/scalar_topologies/three_d_expr_demo_workspace",

  "3Drep build -p three_d_expr_box_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --show-details-for-orientation 'xxxx-++xxx|N0|3' --workspace-path ./examples/cli/scalar_topologies/three_d_expr_demo_workspace",

  "3Drep evaluate --workspace-path ./examples/cli/scalar_topologies/three_d_expr_demo_workspace --precision Double --seed 11 --scale 2.0",

  "3Drep test-cff-ltd -p three_d_expr_box_pow3 -i default -g 0 --workspace-path ./examples/cli/scalar_topologies/three_d_expr_demo_workspace --precision Double --seed 11 --scale 2.0 --clean",

  "3Drep graph-from-signatures --signatures 'prop(k1,m1)*prop(k1+p1,m2)*prop(k1+p1+p2,m3)*prop(k1+p1+p2+p3,m4)' --dot-output ./examples/cli/scalar_topologies/three_d_expr_demo_workspace/box_from_signatures.dot --num-vertices 4",
]
