[cli_settings]
[cli_settings.state]
folder = "./examples/cli/epem_a_ttxh/NLO/state"

[cli_settings.global]
logfile_directive = "info,gammalooprs[kernel]=debug,gammalooprs[orientation_parametric_exprs]=debug,symbolica=off"  # ,gammalooprs[kernel]=debug,gammalooprs[final_integrand]=debug,symbolica=off,gammalooprs[local_3d]=debug"  # ,gammalooprs[build_original_parametric_integrand]=debug"
display_directive = "info,gammalooprs[kernel]=debug,gammalooprs[orientation_parametric_exprs]=debug"  # ,gammalooprs[final_integrand]=debug"

[cli_settings.global.generation.evaluator]
do_algebra = true
iterative_orientation_optimization = false
store_atom = true
compile = true
summed = false
summed_function_map = false
# horner_iterations = 0
# cpe_iterations = 0

[cli_settings.global.generation.orientation_pattern]
pat = "(+,+,-,-,-,-,+,0,+,0,-,+)"

# Otherwise leave them enabled with
[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = true
# The option below specifies the generation of threshold for the kinematics supplied
check_esurface_at_generation = true

[cli_settings.global.generation.compile]
compilation_mode = "assembly"
optimization_level = "O3"
fast_math = true
unsafe_math = true
custom = []

[cli_settings.global.generation.uv]
softct = false
inner_products = true
generate_integrated = false

[cli_settings.global.generation.tropical_subgraph_table]
panic_on_fail = true
disable_tropical_generation = false

[cli_settings.global.n_cores]
feyngen = 10
generate = 10
compile = 10
integrate = 10

[[command_blocks]]
name = "generate_diagrams"
# Mapping of the 11 NLO diagrams w.r.t our notation in https://arxiv.org/pdf/2203.11038
# Targets from the real part of the cross-section in the OS+MSbar scheme
# (table 7 of https://arxiv.org/pdf/2203.11038 and model parameters defined therein)
# GL00 -> F.2 ->  +3.1908e-05
# GL02 -> F.1 ->  -2.504e-06
# GL06 -> F.8 ->  -2.4706e-04
# GL08 -> F.5 ->  -3.2336e-06
# GL10 -> F.9 ->  +4.7475e-05
# GL12 -> F.6 ->  +5.5828e-05
# GL18 -> F.3 ->  +1.3472e-04
# GL20 -> F.10 -> +2.0875e-04
# GL22 -> F.11 -> -9.1283e-05
# GL26 -> F.4 ->  -1.47653e-04
# GL30 -> F.7 ->  -1.18480e-04
# Total: -1.3205e-04
# --select-graphs GL00 GL02 GL06 GL08 GL10 GL12 GL18 GL20 GL22 GL26 GL30
# --select-graphs GL08
# --select-graphs GL26
# --loop-momentum-bases GL26=2,4,11
commands = [
  "import model sm-default.json",
  "set global kv global.n_cores.feyngen=10",

  "remove processes",
  """generate xs e+ e- > t t~ h | e+ e- g t t~ h ghG ghG~ a QCD^2==2 QED^2==6 [{{3}} QCD=1]
      --numerator-grouping group_identical_graphs_up_to_scalar_rescaling
      --symmetrize-left-right-states true
      -p epem_a_tth -i NLO
      --global-prefactor-num "1𝑖"
	  --select-graphs GL00
      --only-diagrams""",
  "save dot",
]

[[command_blocks]]
name = "integrate"
commands = [
  "run set_model_parameters",
  "run set_differential_quantities",
  "run set_differential_observables",
  "run set_differential_selectors",

  """set process -p epem_a_tth string '
    [sampling]
    graphs = "monte_carlo"
    orientations = "monte_carlo"
    lmb_multichanneling = false
    # For importance-sampling over channels, use the quantity below
    # lmb_channels = "monte_carlo"
    lmb_channels = "summed"
    '""",

  """set process -p epem_a_tth -i NLO kv
        integrator.n_increase=0
        integrator.n_start=10000
        integrator.n_max=10000000000
        integrator.seed=1337
    """,
  # --show-max-weight-info-for-discrete-bins
  # --batch-size 100000
  # --no-stream-iterations
  # --show-max-weight-info-for-discrete-bins
  # --no-stream-iterations
  # 		 --show-phase both
  # 		 --show-top-discrete-grid
  # 		 --show-discrete-contributions-sum
  # 		 --sort-contributions integral
  # 		 --show-max-weight-info
  # 		 --renderer tabled
  """integrate -p epem_a_tth -i NLO -p epem_a_tth -i NLO_semi_inclusive --n-cores 1
                 --target epem_a_tth@NLO=-3.2336e-06,0.0
				 --renderer ratatui
				 --batch-size 1000
				 --show-phase real
				 --show-max-weight-info
				 --show-top-discrete-grid
				 --show-discrete-contributions-sum
				 --write-results-for-each-iteration
                 --restart
    """
]

[[command_blocks]]
name = "generate_integrands"
commands = [
  "generate existing -p epem_a_tth -i NLO",
  "duplicate integrand -p epem_a_tth -i NLO --output_process_name epem_a_tth --output_integrand_name NLO_semi_inclusive",
  "save state -o"
]

[[command_blocks]]
name = "set_model_parameters"
commands = [
  "set model MT=173.0",
  "set model WT=0.0",
  "set model ymt=173.0",
  "set model aS=0.118",
  "set model aEWM1=132.507",
  "set model Gf=1.166390e-05",
  "set model MZ=91.188",
]

[[command_blocks]]
name = "set_differential_quantities"
commands = [
  """set process -p epem_a_tth -i NLO string '

[quantities.integral]
type = "integral"

[quantities.jet_pt]
type = "jet"
computation = "scalar"
quantity = "PT"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.jet_energy]
type = "jet"
computation = "scalar"
quantity = "E"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.jet_y]
type = "jet"
computation = "scalar"
quantity = "y"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.jet_eta]
type = "jet"
computation = "scalar"
quantity = "eta"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.jet_cos_theta]
type = "jet"
computation = "scalar"
quantity = "CosTheta"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.jet_count]
type = "jet"
computation = "count"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.top_energy]
type = "particle"
computation = "scalar"
pdgs = [-6,6]
quantity = "E"
ordering = "Quantity"
order = "Descending"

[quantities.higgs_energy]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "E"

[quantities.top_pt]
type = "particle"
computation = "scalar"
pdgs = [-6,6]
quantity = "PT"

[quantities.higgs_pt]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "PT"

[quantities.top_y]
type = "particle"
computation = "scalar"
pdgs = [-6,6]
quantity = "y"

[quantities.higgs_y]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "y"

[quantities.top_eta]
type = "particle"
computation = "scalar"
pdgs = [-6,6]
quantity = "eta"

[quantities.higgs_eta]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "eta"

[quantities.top_cos_theta]
type = "particle"
computation = "scalar"
pdgs = [-6,6]
quantity = "CosTheta"

[quantities.higgs_cos_theta]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "CosTheta"
'""",

  """set process -p epem_a_tth -i NLO_semi_inclusive string '

[quantities.higgs_cos_theta]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "CosTheta"

[quantities.higgs_energy]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "E"

'"""
]

[[command_blocks]]
name = "set_differential_selectors"
commands = [
  """set process -p epem_a_tth -i NLO_semi_inclusive string '

[selectors.higgs_energy_cut]
quantity = "higgs_energy"
selector = "value_range"
entry_selection = "leading_only"
min = 250.0
max = 500.0

[selectors.higgs_cos_theta_cut]
quantity = "higgs_cos_theta"
selector = "value_range"
entry_selection = "leading_only"
min = -0.6
max = 0.6

'"""
]

