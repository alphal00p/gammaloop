# Standalone steering card for the symmetrized, exact-xi subtracted
# d d~ -> H H H two-loop amplitude imported from qq_hhh_2L.dot.
#
# This file is meant to live in:
#   examples/cli/qq_hhh_2L/qq_hhh_2L.toml
#
# Loading the card intentionally does not run any command. Typical usage:
#
#   ./target/debug/gammaloop --clean-state examples/cli/qq_hhh_2L/qq_hhh_2L.toml
#   ./target/debug/gammaloop -o -s ./examples/cli/qq_hhh_2L/state run generate_diagrams generate_integrands integrate
#
# The process has nine external momenta:
#   Q(0) Q(1) Q(2) Q(3) -> Q(4) Q(5) Q(6) Q(7) Q(8)
# where Q(0), Q(1) are d, d~, Q(6), Q(7), Q(8) are the Higgses, and
# Q(2)=Q(4)=xi and Q(3)=Q(5)=xi are auxiliary exact-xi helper pairs.
# The helper vector is kept away from Q(0)+Q(1) to avoid artificial
# threshold/pass-on denominator degeneracies in the exact-xi topology.
#
# The intended production setup keeps threshold subtraction enabled, sums over
# orientations, compiles a SummedFunctionMap evaluator, and generates all LMB
# channels with inverse-Jacobian multichanneling. Keep
# `assume_positive_external_energies=false` for this exact-xi topology.
# With it enabled, threshold generation trims surfaces involving the helper
# legs, and runtime inspect aborts because those surfaces are still required by
# the threshold-counterterm existence check for the configured kinematics.
commands = []

[cli_settings]
[cli_settings.state]
folder = "./examples/cli/qq_hhh_2L/state"
name = "qq_hhh_2L"

[[command_blocks]]
name = "load"
commands = [
    "set global kv global.generation.override_lmb_heuristics=true",
    "set global kv global.generation.evaluator.store_atom=false",
    "set global kv global.generation.evaluator.compile=true",
    "set global kv global.generation.evaluator.summed=false",
    "set global kv global.generation.evaluator.summed_function_map=true",
    "set global kv global.generation.uv.subtract_uv=false",
    "set global kv global.generation.uv.generate_integrated=false",
    "set global kv global.generation.threshold_subtraction.enable_thresholds=true",
    "set global kv global.generation.threshold_subtraction.check_esurface_at_generation=false",
    "set global kv global.generation.threshold_subtraction.assume_positive_external_energies=false",
    "import model sm-default.json",
    "set model MT=173.0",
    "set model MH=125.0",
    "set model WT=0.0",
    "set model WH=0.0",
    "set model ymt=173.0",
    "remove processes -p qq_hhh_2L",
    "import graphs ./examples/cli/qq_hhh_2L/qq_hhh_2L.dot -p qq_hhh_2L -i subtracted"
]

[[command_blocks]]
name = "generate_diagrams"
commands = [
    "run load"
]

[[command_blocks]]
name = "generate"
commands = [
    "set global kv global.generation.override_lmb_heuristics=true",
    "set global kv global.generation.evaluator.store_atom=false",
    "set global kv global.generation.evaluator.compile=true",
    "set global kv global.generation.evaluator.summed=false",
    "set global kv global.generation.evaluator.summed_function_map=true",
    "set global kv global.generation.uv.subtract_uv=false",
    "set global kv global.generation.uv.generate_integrated=false",
    "set global kv global.generation.threshold_subtraction.enable_thresholds=true",
    "set global kv global.generation.threshold_subtraction.check_esurface_at_generation=false",
    "set global kv global.generation.threshold_subtraction.assume_positive_external_energies=false",
    "generate existing -p qq_hhh_2L -i subtracted"
]

[[command_blocks]]
name = "generate_integrands"
commands = [
    "run generate"
]

