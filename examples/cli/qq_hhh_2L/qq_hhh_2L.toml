    "run runtime_single_parametric sampling_lmb_mc",
    "set process -p qq_hhh_2L -i subtracted kv general.generate_events=true general.store_additional_weights_in_event=true general.enable_cache=false integrator.integrated_phase=\"imag\"",
    "inspect -p qq_hhh_2L -i subtracted --discrete-dim 1 9 -f -x 0.23262693392408407 3.4231896575351528e-07 0.49485992364488252 0.99442214604999712 0.33719614224884459 0.78136672187917255",
    "inspect -p qq_hhh_2L -i subtracted --discrete-dim 0 11 -f -x 0.2754370318227255 0.025975374287740258 0.50782398548203456 0.68942356972268137 0.8046095789779234 0.5244357050879469"
]

