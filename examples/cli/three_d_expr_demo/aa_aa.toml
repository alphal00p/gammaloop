  "run profile_evaluate_eager -D process_name={process_name} -D graph_id={graph_id} -D workspace_name={workspace_name} -D seed={seed} -D scale={scale} -D profile_duration={profile_duration} -D representation=ltd -D precision=Double -D manifest_name={workspace_name}_eval_01.json",
