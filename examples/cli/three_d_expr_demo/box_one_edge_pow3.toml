commands = []

[cli_settings]
[cli_settings.state]
folder = "./examples/cli/three_d_expr_demo/box_one_edge_pow3_state"
name = "box_one_edge_pow3"

[cli_settings.global.generation]
uniform_numerator_sampling_scale = "beyond_quadratic"

[default_runtime_settings.general]
numerator_interpolation_scale = 2.0

[[command_blocks]]
name = "load"
commands = [
  "import model scalars-default.json",
  "remove processes",

  """import graphs string '
digraph box_one_edge_pow3 {
  node [num="1"];
  num=1;
  overall_factor=1;
  ext [style=invis];

  ext -> B:0 [particle="scalar_0" id=0 name="p1"];
  ext -> C:1 [particle="scalar_0" id=1 name="p2"];
  ext -> D:2 [particle="scalar_0" id=2 name="p3"];
  A:3 -> ext [particle="scalar_0" id=3 name="p4"];

  A -> B [particle="scalar_1" id=4 name="q0" lmb_id=0 num="Q(4,spenso::cind(0))"];
  B -> C [particle="scalar_1" id=5 name="q1" num="Q(5,spenso::cind(0))"];
  C -> D [particle="scalar_1" id=6 name="q2"];
  D -> E [particle="scalar_1" id=7 name="q3" num="Q(7,spenso::cind(0))^4"];
  E -> F [particle="scalar_1" id=8 name="q4"];
  F -> A [particle="scalar_1" id=9 name="q5"];
}
' -p box_one_edge_pow3 -i default -o""",

  "save state -o",
]

[[command_blocks]]
name = "validate_loaded_graph"
commands = [
  "3Drep validate -p box_one_edge_pow3 -i default -g 0 --json-out ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace/validate.json",
]

[[command_blocks]]
name = "build_ltd_structure"
commands = [
  "3Drep build -p box_one_edge_pow3 -i default -g 0 --representation ltd --clean --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace",
]

[[command_blocks]]
name = "build_cff_structure_overview"
commands = [
  "3Drep build -p box_one_edge_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace",
]

[[command_blocks]]
name = "show_one_cff_orientation_variant"
commands = [
  "3Drep build -p box_one_edge_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --show-details-for-orientation 'xxxx-++xxx|N0|3' --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace",
]

[[command_blocks]]
name = "evaluate_cff_double_eager"
commands = [
  "set global kv global.generation.evaluator.compile=false",
  "3Drep evaluate -p box_one_edge_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace --precision Double --seed 11 --scale 0.25 --clean",
]

[[command_blocks]]
name = "evaluate_cff_quad_eager"
commands = [
  "3Drep evaluate -p box_one_edge_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace --precision Quad --seed 11 --scale 0.25 --clean",
]

[[command_blocks]]
name = "evaluate_cff_arbprec_eager"
commands = [
  "3Drep evaluate -p box_one_edge_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace --precision ArbPrec --seed 11 --scale 0.25 --clean",
]

[[command_blocks]]
name = "evaluate_numerator_only_double"
commands = [
  "3Drep evaluate -p box_one_edge_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace --precision Double --seed 11 --scale 0.25 --numerator-only --numerator-q0 4:0.125,7:-0.25 --clean",
]

[[command_blocks]]
name = "profile_cff_double_eager"
commands = [
  "3Drep evaluate -p box_one_edge_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace --precision Double --seed 11 --scale 0.25 --profile 10ms --eager --clean",
]

[[command_blocks]]
name = "compare_cff_ltd_double"
commands = [
  "3Drep test-cff-ltd -p box_one_edge_pow3 -i default -g 0 --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace --precision Double --seed 11 --scale 0.25 --clean",
]

[[command_blocks]]
name = "compare_cff_ltd_quad"
commands = [
  "3Drep test-cff-ltd -p box_one_edge_pow3 -i default -g 0 --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace --precision Quad --seed 11 --scale 0.25 --clean",
]

[[command_blocks]]
name = "compare_cff_ltd_arbprec"
commands = [
  "3Drep test-cff-ltd -p box_one_edge_pow3 -i default -g 0 --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace --precision ArbPrec --seed 11 --scale 0.25 --clean",
]

[[command_blocks]]
name = "evaluate_cff_double_symjit"
commands = [
  """set global string '
[global.generation.evaluator]
compile = true

[global.generation.compile]
compilation_mode = "symjit"
optimization_level = "O0"
fast_math = false
unsafe_math = false
custom = []
'""",
  "3Drep evaluate -p box_one_edge_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace --precision Double --seed 11 --scale 0.25 --clean",
]

[[command_blocks]]
name = "evaluate_cff_double_assembly"
commands = [
  """set global string '
[global.generation.evaluator]
compile = true

[global.generation.compile]
compilation_mode = "assembly"
optimization_level = "O0"
fast_math = false
unsafe_math = false
custom = []
'""",
  "3Drep evaluate -p box_one_edge_pow3 -i default -g 0 --representation cff --numerator-samples-normalization M_for_beyond_quadratic_only --workspace-path ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace --precision Double --seed 11 --scale 0.25 --clean",
]

[[command_blocks]]
name = "reconstruct_box_from_signatures"
commands = [
  "3Drep graph-from-signatures --signatures 'prop(k1,m1)*prop(k1+p1,m2)*prop(k1+p1+p2,m3)*prop(k1+p1+p2+p3,m4)' --dot-output ./examples/cli/three_d_expr_demo/box_one_edge_pow3_workspace/box_from_signatures.dot --num-vertices 4",
]

[[command_blocks]]
name = "demo"
commands = [
  "run load",
  "run validate_loaded_graph",
  "run build_ltd_structure",
  "run build_cff_structure_overview",
  "run show_one_cff_orientation_variant",
  "run evaluate_cff_double_eager",
  "run evaluate_cff_quad_eager",
  "run evaluate_cff_arbprec_eager",
  "run evaluate_numerator_only_double",
  "run profile_cff_double_eager",
  "run compare_cff_ltd_double",
  "run compare_cff_ltd_quad",
  "run compare_cff_ltd_arbprec",
  "run evaluate_cff_double_symjit",
  "run evaluate_cff_double_assembly",
  "run reconstruct_box_from_signatures",
]
