commands = [
  "run generate",
  "quit -o"
]

[cli_settings]
[cli_settings.state]
folder = "./examples/cli/gg_hhh/3L/state"
name = "gg_hhh_3l"

[[commands_blocks]]
name = "generate"
commands = [

    "import model sm-default.json",

    "reset processes",
    "import graphs ./examples/cli/gg_hhh/3L/3L_graph.dot -p gg_hhh -i 3L",
    "generate",
    "save dot",
    "save state -o",

]

[[commands_blocks]]
name = "setup_euclidean_configuration"
commands = [
    "set model MT=1000.0",
    "set model WT=0.0",
    "set model ymt=1000.0",
]

[[commands_blocks]]
name = "setup_physical_configuration"
commands = [
    "set model MT=173.0",
    "set model WT=0.0",
    "set model ymt=173.0",
]

[[commands_blocks]]
name = "integrate"
commands = [

    "set process -p gg_hhh -i 3L defaults",

    # Disable stability checks
    # "set process -p gg_hhh -i 3L stability.rotation_axis []",

    "set process -p gg_hhh -i 3L kv integrator.n_start=1000 integrator.n_max=10000",

    """integrate --process gg_hhh -i 3L --n-cores 10
        --workspace-path ./GL_OUTPUT/gg_hhh/3L/integration_workspace
        --result-path ./GL_OUTPUT/gg_hhh/3L/integration_workspace/result.txt
        --restart
    """,

]

[default_runtime_settings.general]
enable_cache = true
debug_cache = false

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [
   	[500.0, 0.0, 0.0, 500.0],
   	[500.0, 0.0, 0.0, -500.0],
    [0.4385555662246945e3, 0.1553322001835378e3, 0.3480160396513587e3, -0.1773773615718412e3],
    [0.3563696374921922e3, -0.1680238900851100e2, -0.3187291102436005e3, 0.9748719163688098e2],
    "dependent"
]
helicities = [
    1,
	1,
	0,
	0,
	0
]

# Default "naive" parameterization
# [default_runtime_settings.sampling]
# type = "default"
# mode = "spherical"
# mapping = "linear"
# b = 10.0

## a) Tropical sampling run.
#[default_runtime_settings.sampling]
#type = "discrete_graph_sampling"
#[default_runtime_settings.sampling.sampling_type]
#subtype = "tropical"

##b) MC over LMB with explicit sum per sample point.
#[default_runtime_settings.sampling]
#type = "discrete_graph_sampling"
#[default_runtime_settings.sampling.sampling_type]
#subtype = "multi_channeling"

##c) MC over LMB with importance sampling of channels
[default_runtime_settings.sampling]
type = "discrete_graph_sampling"
[default_runtime_settings.sampling.sampling_type]
subtype = "discrete_multi_channeling"

##d) MC over LMB and single orientation per, both importance-sampled
#[default_runtime_settings.sampling]
#type = "discrete_graph_sampling"
#sample_orientations = true
#[default_runtime_settings.sampling.sampling_type]
#subtype = "discrete_multi_channeling"

[cli_settings.global.generation.compile]
inline_asm = true
optimization_level = "O3"
fast_math = true
unsafe_math = true
custom = []

[cli_settings.global.n_cores]
feyngen = 10
generate = 10
compile = 10
integrate = 10

[cli_settings.global.generation.tropical_subgraph_table]
panic_on_fail = true
disable_tropical_generation = false

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = false
compile = true
summed = false
summed_function_map = true

# Disable thresholds with
[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = false
[default_runtime_settings.subtraction]
disable_threshold_subtraction = true

