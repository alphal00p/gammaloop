commands = [

    "set model MT={re:173.0,im:0.0}",
    "set model WT={re:0.0,im:0.0}",
    "set model ymt={re:173.0,im:0.0}",

    "set process -p gg_hhh -i 2L defaults",
    """ set process -p gg_hhh -i 2L string '
    [sampling]
    type = "discrete_graph_sampling"
    sample_orientations = true
    [sampling.sampling_type]
    subtype = "discrete_multi_channeling"
    '""",
    "display settings process -p gg_hhh -i 2L",

    # Disable stability checks
    # "set process -p gg_hhh -i 1L stability.rotation_axis []",

    "set process -p gg_hhh -i 2L kv integrator.n_start=100 integrator.n_max=1000000",

    """integrate --process gg_hhh -i 2L --n-cores 10
        --workspace-path ./GL_OUTPUT/gg_hhh/2L/integration_workspace
        --result-path ./GL_OUTPUT/gg_hhh/2L/integration_workspace/result.txt
        --restart
    """,

    "quit -n",

]

[default_runtime_settings.general]
enable_cache = true
debug_cache = false

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [
   	[500.0, 0.0, 0.0, 500.0],
   	[500.0, 0.0, 0.0, -500.0],
    [0.4385555662246945e3, 0.1553322001835378e3, 0.3480160396513587e3, -0.1773773615718412e3],
    [0.3563696374921922e3, -0.1680238900851100e2, -0.3187291102436005e3, 0.9748719163688098e2],
    "dependent"
]
helicities = [
    1,
	1,
	0,
	0,
	0
]

