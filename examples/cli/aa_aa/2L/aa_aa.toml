[[command_blocks]]
name = "set_model_parameters"
commands = [
    "set model MT=173.0",
    "set model WT=0.0",
    "set model ymt=173.0",
    "set model aS=0.118",
    "set model aEWM1=137.036",
    "set model Gf=1.166390e-05",
    "set model MZ=91.188",
]

