commands = ["run generate_diagrams"]

[cli_settings]
override_state = true

[cli_settings.state]
name = "aa_aa_3L_grouped"
folder = "./examples/cli/aa_aa/3L/gammaloop_state_grouped"

[cli_settings.global]
display_directive = "info"
logfile_directive = "info"

[cli_settings.global.log_style]
include_fields = true
full_line_source = true
log_format = "Full"
short_timestamp = true

[cli_settings.global.generation]
override_lmb_heuristics = false

[cli_settings.global.generation.uv]
softct = false
generate_integrated = false
subtract_uv = false
final_integrand = "ThreeD"
pole_part = false
add_marker = false
keep_marker = true
inner_products = true
orchestrator = "legacy_dag_forest"

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = false
compile = false
summed = false
summed_function_map = false
direct_translation = true
horner_iterations = 5
cpe_iterations = 5

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = false
check_esurface_at_generation = false

[cli_settings.global.generation.tropical_subgraph_table]
panic_on_fail = true
disable_tropical_generation = true

[cli_settings.global.n_cores]
feyngen = 10
generate = 10
compile = 1
integrate = 20

[[command_blocks]]
name = "generate_diagrams"
commands = [
  "import model sm-default.json",
  "set global kv global.n_cores.feyngen=10",
  "remove processes -p aa_aa",
  """generate amp a a > a a | a t t~ g ghG ghG~ QCD==4 QED==4 [{3}]
        --numerator-grouping group_identical_graphs_up_to_scalar_rescaling
        --number-of-samples-for-numerator-comparisons 1
        --fully-numerical-substitution-when-comparing-numerators=true
        --compare-canonized-numerator=false
        --symmetrize-initial-states=true --symmetrize-final-states=true
        -p aa_aa -i 3L --only-diagrams""",
  "save dot ./examples/cli/aa_aa/3L/graphs_grouped",
  "save state -o",
]

[default_runtime_settings.kinematics]
e_cm = 300.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [
  [86.5, 0.0, 0.0, 86.5],
  [86.5, 0.0, 0.0, -86.5],
  [86.5, 0.0, -79.27855952273603, -34.6],
  "dependent",
]
helicities = [+1, -1, +1, -1]

[default_runtime_settings.general]
evaluator_method = "SingleParametric"
enable_cache = false
debug_cache = false
generate_events = false
store_additional_weights_in_event = false
integral_unit = "none"
mu_r = 91.188
m_uv = 9.188

[default_runtime_settings.subtraction]
disable_threshold_subtraction = true
