#:schema https://raw.githubusercontent.com/alphal00p/gammaloop/refs/heads/HEAD/assets/schemas/runhistory.json

# Simple GammaLoop workflow example
# This file demonstrates basic commands for loading a model,
# generating processes, and performing computations

commands = [
    # Load the Standard Model
    "import model sm-default",

    # Display available processes (should be empty initially)
    "display processes",

    # Generate a simple tree-level decay process
    "generate xs z > d d~ --only-diagrams",

    # Generate another simple decay process
    "generate xs z > b b~ --only-diagrams",

    # Display all processes again
    "display processes",

    # Save all diagrams
    "save dot"
]

# Default CLI settings for this workflow
[cli_settings]
[cli_settings.state]
folder = "./example_state"

[cli_settings.global]
logfile_directive = "info"
display_directive = "info"

# Default runtime settings for integration
[default_runtime_settings.general]
m_uv = 1.0
mu_r_sq = 91.1876  # Z boson mass squared

[default_runtime_settings.kinematics]
e_cm = 91.1876  # Center of mass energy (Z resonance)

[default_runtime_settings.integrator]
n_max = 1000000
max_prob_ratio = 0.01
