commands = [
    "run set_generation_settings -D representation=$(representation:CFF) -D explicit_orientation_sum_only=$(explicit_orientation_sum_only:false) -D compile=$(compile:false) -D summed=$(summed:false) -D summed_function_map=$(summed_function_map:false) -D horner_iterations=$(horner_iterations:0) -D cpe_iterations=$(cpe_iterations:0) -D compilation_mode=$(compilation_mode:symjit) -D generate_integrated=$(generate_integrated:false) -D local_uv_from_expanded_4d=$(local_uv_from_expanded_4d:false)",
    "set global kv global.n_cores.generate=$(generate_cores:4) global.generation.threshold_subtraction.enable_thresholds=$(enable_thresholds:false) global.generation.threshold_subtraction.check_esurface_at_generation=true global.generation.threshold_subtraction.skip_thresholds_that_are_cuts=true",
]

[[command_blocks]]
name = "generate_bnl_reference_case"
commands = [
    "run set_bnl_reference_generation_settings -D representation=$(representation:CFF) -D explicit_orientation_sum_only=$(explicit_orientation_sum_only:false) -D summed=$(summed:false) -D summed_function_map=$(summed_function_map:false) -D compilation_mode=$(compilation_mode:symjit) -D local_uv_from_expanded_4d=$(local_uv_from_expanded_4d:false) -D enable_thresholds=$(enable_thresholds:false) -D compile=$(compile:false) -D horner_iterations=$(horner_iterations:0) -D cpe_iterations=$(cpe_iterations:0) -D generate_integrated=$(generate_integrated:false) -D generate_cores=$(generate_cores:4)",
    "run load_graph",
    "run set_model -D mt=$(mt:400.0) -D ymt=$(ymt:400.0)",
    "run set_kinematics_bnl_reference -D disable_threshold_subtraction=$(disable_threshold_subtraction:false) -D helicities=$(helicities:-1,1,-1,1,1,-1,1)",
    "generate existing -p BNL -i default",
    "save state -o",
]

