#:schema https://raw.githubusercontent.com/alphal00p/gammaloop/v0.3.3/assets/schemas/runhistory.json
commands = ["run generate_diagrams "]

[default_runtime_settings.general]
m_uv = 91.188
mu_r = 91.188
integral_unit = "picobarn"

[default_runtime_settings.kinematics]
e_cm = 1000.0

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics.externals.data]
momenta = [
    [
    500.0,
    0.0,
    0.0,
    500.0,
],
    [
    500.0,
    0.0,
    0.0,
    -500.0,
],
]
helicities = [
    "summed_averaged",
    "summed_averaged",
]

[default_runtime_settings.integrator.observables_output]
format = [
    "hwu",
    "json",
]

[default_runtime_settings.stability]
escalate_if_exact_zero = false

[[default_runtime_settings.stability.rotation_axis]]
type = "z"

[default_runtime_settings.subtraction]
disable_threshold_subtraction = true

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
compile = true
store_atom = true

[cli_settings.global.generation.compile]
compilation_mode = "assembly"

[cli_settings.global.generation.tropical_subgraph_table]
panic_on_fail = true

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = false
check_esurface_at_generation = true

[cli_settings.global.generation.uv]
softct = false
generate_integrated = false

[cli_settings.global.n_cores]
feyngen = 10
generate = 10
compile = 10
integrate = 10

[[command_blocks]]
name = "generate_diagrams"
commands = [
    "import model sm-default.json",
    "set global kv global.n_cores.feyngen=10",
    "remove processes",
    """
generate xs e+ e- > t t~ h | e+ e- g t t~ h ghG ghG~ a QCD^2==2 QED^2==6 [{{3}} QCD=1]
      --numerator-grouping group_identical_graphs_up_to_scalar_rescaling
      --symmetrize-left-right-states true
      -p epem_a_tth -i NLO
      --global-prefactor-num "1𝑖"
      --select-graphs GL30
      --only-diagrams""",
    "save dot",
]

[[command_blocks]]
name = "generate_integrands"
commands = [
    "generate existing -p epem_a_tth -i NLO",
    "duplicate integrand -p epem_a_tth -i NLO --output_process_name epem_a_tth --output_integrand_name NLO_semi_inclusive",
    "save state -o",
]

[[command_blocks]]
name = "integrate"
commands = [
    "run set_model_parameters",
    "run set_differential_quantities",
    "run set_differential_observables",
    "run set_differential_selectors",
    """
set process -p epem_a_tth string '
    [sampling]
    graphs = "monte_carlo"
    orientations = "summed"
    lmb_multichanneling = true
    # For importance-sampling over channels, use the quantity below
    # lmb_channels = "monte_carlo"
    lmb_channels = "summed"
    '""",
    """
set process -p epem_a_tth string '
  [[stability.rotation_axis]]
  type = "x"
  [[stability.rotation_axis]]
  type = "y"

  [[stability.levels]]
  precision = "Double"
  required_precision_for_re = 1.0e-5
  required_precision_for_im = 1.0e-5
  escalate_for_large_weight_threshold = 0.99

  [[stability.levels]]
  precision = "Arb"
  required_precision_for_re = 1.0e-5
  required_precision_for_im = 1.0e-5
  escalate_for_large_weight_threshold = -1.0
      '""",
    """
set process -p epem_a_tth -i NLO kv
        integrator.n_increase=0
        integrator.n_start=10000
        integrator.n_max=10000000000
        integrator.seed=1337
        general.m_uv=91.188

    """,
    """
integrate -p epem_a_tth -i NLO --n-cores 10
                 --target epem_a_tth@NLO=0.0,5.924e-05
\t\t\t\t --renderer ratatui
\t\t\t\t --batch-size 1000
\t\t\t\t --show-phase both
\t\t\t\t --show-max-weight-info
\t\t\t\t --show-top-discrete-grid
\t\t\t\t --show-discrete-contributions-sum
\t\t\t\t --write-results-for-each-iteration
                 --restart
    """,
]

[[command_blocks]]
name = "set_model_parameters"
commands = [
    "set model MT=173.0",
    "set model WT=0.0",
    "set model ymt=173.0",
    "set model aS=0.118",
    "set model aEWM1=132.507",
    "set model Gf=1.166390e-05",
    "set model MZ=91.188",
]

[[command_blocks]]
name = "set_differential_quantities"
commands = [
    """
set process -p epem_a_tth -i NLO string '

[quantities.integral]
type = "integral"

[quantities.jet_pt]
type = "jet"
computation = "scalar"
quantity = "PT"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.jet_energy]
type = "jet"
computation = "scalar"
quantity = "E"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.jet_y]
type = "jet"
computation = "scalar"
quantity = "y"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.jet_eta]
type = "jet"
computation = "scalar"
quantity = "eta"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.jet_cos_theta]
type = "jet"
computation = "scalar"
quantity = "CosTheta"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.jet_count]
type = "jet"
computation = "count"
algorithm = "anti_kt"
dR = 0.4
min_jpt = 20.0
clustered_pdgs = [-82, -5, -4, -3, -2, -1, 1, 2, 3, 4, 5, 82]
ordering = "PT"
order = "Descending"

[quantities.top_energy]
type = "particle"
computation = "scalar"
pdgs = [-6,6]
quantity = "E"
ordering = "Quantity"
order = "Descending"

[quantities.higgs_energy]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "E"

[quantities.top_pt]
type = "particle"
computation = "scalar"
pdgs = [-6,6]
quantity = "PT"

[quantities.higgs_pt]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "PT"

[quantities.top_y]
type = "particle"
computation = "scalar"
pdgs = [-6,6]
quantity = "y"

[quantities.higgs_y]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "y"

[quantities.top_eta]
type = "particle"
computation = "scalar"
pdgs = [-6,6]
quantity = "eta"

[quantities.higgs_eta]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "eta"

[quantities.top_cos_theta]
type = "particle"
computation = "scalar"
pdgs = [-6,6]
quantity = "CosTheta"

[quantities.higgs_cos_theta]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "CosTheta"
'""",
    """
set process -p epem_a_tth -i NLO_semi_inclusive string '

[quantities.higgs_cos_theta]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "CosTheta"

[quantities.higgs_energy]
type = "particle"
computation = "scalar"
pdgs = [25,]
quantity = "E"

'""",
]

[[command_blocks]]
name = "set_differential_selectors"
commands = ["""
set process -p epem_a_tth -i NLO_semi_inclusive string '

[selectors.higgs_energy_cut]
quantity = "higgs_energy"
selector = "value_range"
entry_selection = "leading_only"
min = 250.0
max = 500.0

[selectors.higgs_cos_theta_cut]
quantity = "higgs_cos_theta"
selector = "value_range"
entry_selection = "leading_only"
min = -0.6
max = 0.6

'"""]

[[command_blocks]]
name = "set_differential_observables"
commands = ["""
set process -p epem_a_tth -i NLO string '

[observables.integral]
title = "xs"
type_description = "AL,NLO"
quantity = "integral"
phase = "real"
kind = "discrete"
domain = { type = "single_bin" }
labels = { type = "custom", labels = ["total integral"] }

# Higgs observables

[observables.higgs_energy]
title = "H E"
type_description = "AL,NLO"
quantity = "higgs_energy"
phase = "real"
x_min = 0.0
x_max = 500.0
n_bins = 100

[observables.higgs_log_energy]
title = "H log E"
type_description = "AL,NLO"
quantity = "higgs_energy"
value_transform = "log10"
phase = "real"
x_min = 0.0
x_max = 5.0
n_bins = 100

[observables.higgs_pt]
title = "H pt"
type_description = "AL,NLO"
quantity = "higgs_pt"
phase = "real"
x_min = 0.0
x_max = 500.0
n_bins = 100

[observables.higgs_log_pt]
title = "H log pt"
type_description = "AL,NLO"
quantity = "higgs_pt"
value_transform = "log10"
phase = "real"
x_min = 0.0
x_max = 5.0
n_bins = 100

[observables.higgs_y]
title = "H y"
type_description = "AL,NLO"
quantity = "higgs_y"
phase = "real"
x_min = -6.0
x_max =  6.0
n_bins = 60

[observables.higgs_eta]
title = "H eta"
type_description = "AL,NLO"
quantity = "higgs_eta"
phase = "real"
x_min = -6.0
x_max =  6.0
n_bins = 60

# Top quark observables

[observables.top_energy]
title = "top E"
type_description = "AL,NLO"
quantity = "top_energy"
phase = "real"
x_min = 0.0
x_max = 500.0
n_bins = 100

[observables.top_log_energy]
title = "top log E"
type_description = "AL,NLO"
quantity = "top_energy"
value_transform = "log10"
phase = "real"
x_min = 0.0
x_max = 5.0
n_bins = 100

[observables.top_pt]
title = "top pt"
type_description = "AL,NLO"
quantity = "top_pt"
phase = "real"
x_min = 0.0
x_max = 500.0
n_bins = 100

[observables.top_log_pt]
title = "top log pt"
type_description = "AL,NLO"
quantity = "top_pt"
value_transform = "log10"
phase = "real"
x_min = 0.0
x_max = 5.0
n_bins = 100

[observables.top_y]
title = "top y"
type_description = "AL,NLO"
quantity = "top_y"
phase = "real"
x_min = -6.0
x_max =  6.0
n_bins = 60

[observables.top_eta]
title = "top eta"
type_description = "AL,NLO"
quantity = "top_eta"
phase = "real"
x_min = -6.0
x_max =  6.0
n_bins = 60

# Jet observables

[observables.jet_energy]
title = "jet E"
type_description = "AL,NLO"
quantity = "jet_energy"
phase = "real"
x_min = 0.0
x_max = 500.0
n_bins = 100

[observables.jet_log_energy]
title = "jet log E"
type_description = "AL,NLO"
quantity = "jet_energy"
value_transform = "log10"
phase = "real"
x_min = 0.0
x_max = 5.0
n_bins = 100

[observables.jet_pt]
title = "jet pt"
type_description = "AL,NLO"
quantity = "jet_pt"
phase = "real"
x_min = 0.0
x_max = 500.0
n_bins = 100

[observables.jet_log_pt]
title = "jet log pt"
type_description = "AL,NLO"
quantity = "jet_pt"
value_transform = "log10"
phase = "real"
x_min = 0.0
x_max = 5.0
n_bins = 100

[observables.jet_y]
title = "jet y"
type_description = "AL,NLO"
quantity = "jet_y"
phase = "real"
x_min = -6.0
x_max =  6.0
n_bins = 60

[observables.jet_eta]
title = "jet eta"
type_description = "AL,NLO"
quantity = "jet_eta"
phase = "real"
x_min = -6.0
x_max =  6.0
n_bins = 60

[observables.jet_count_hist]
quantity = "jet_count"
entry_selection = "all"
phase = "real"
kind = "discrete"
domain = { type = "explicit_range", min = 0, max = 1 }

'"""]
