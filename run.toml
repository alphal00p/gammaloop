[[command_blocks]]
name = "set_default_kinematics_no_threshold"
commands = ["run set_kinematics_no_threshold"]

[[command_blocks]]
name = "set_default_kinematics_threshold"
commands = ["run set_kinematics_threshold"]

[[command_blocks]]
name = "set_integrand_kinematics_no_threshold"
commands = [
    "run set_kinematics_no_threshold",
    "set process -p BNL -i default defaults",
]

[[command_blocks]]
name = "set_integrand_kinematics_threshold"
commands = [
    "run set_kinematics_threshold",
    "set process -p BNL -i default defaults",
]

[[command_blocks]]
name = "set_generation_settings"
commands = ["set global kv global.3d_representation=$(representation:CFF) global.generation.explicit_orientation_sum_only=$(explicit_orientation_sum_only:false) global.generation.evaluator.compile=$(compile:false) global.generation.evaluator.summed=$(summed:false) global.generation.evaluator.summed_function_map=$(summed_function_map:false) global.generation.evaluator.horner_iterations=$(horner_iterations:0) global.generation.evaluator.cpe_iterations=$(cpe_iterations:0) global.generation.compile.compilation_mode=$(compilation_mode:symjit) global.generation.uv.generate_integrated=$(generate_integrated:false) global.generation.uv.local_uv_cts_from_expanded_4d_integrands=$(local_uv_from_expanded_4d:false)"]

[[command_blocks]]
name = "set_optimized_generation_settings"
commands = ["run set_generation_settings -D compile=true -D horner_iterations=5 -D cpe_iterations=$(cpe_iterations:5)"]

[[command_blocks]]
name = "generate_case"
commands = [
    "run set_generation_settings -D representation=$(representation:CFF) -D explicit_orientation_sum_only=$(explicit_orientation_sum_only:false) -D compile=$(compile:false) -D summed=$(summed:false) -D summed_function_map=$(summed_function_map:false) -D horner_iterations=$(horner_iterations:0) -D cpe_iterations=$(cpe_iterations:0) -D compilation_mode=$(compilation_mode:symjit) -D generate_integrated=$(generate_integrated:false) -D local_uv_from_expanded_4d=$(local_uv_from_expanded_4d:false)",
    "set global kv global.generation.threshold_subtraction.enable_thresholds=$(enable_thresholds:false)",
    "run load_graph",
    "run $(model_block:set_model_no_threshold)",
    "run $(default_kinematics_block:set_default_kinematics_no_threshold)",
    "generate existing -p BNL -i default",
    "save state -o",
]

[[command_blocks]]
name = "generate_no_threshold"
commands = ["run generate_case -D enable_thresholds=false -D model_block=set_model_no_threshold -D default_kinematics_block=set_default_kinematics_no_threshold"]

[[command_blocks]]
name = "generate_threshold"
commands = ["run generate_case -D enable_thresholds=true -D model_block=set_model_threshold -D default_kinematics_block=set_default_kinematics_threshold"]

[[command_blocks]]
name = "generate_no_threshold_optimized"
commands = ["run generate_case -D enable_thresholds=false -D model_block=set_model_no_threshold -D default_kinematics_block=set_default_kinematics_no_threshold -D compile=true -D horner_iterations=5 -D cpe_iterations=$(cpe_iterations:5)"]

[[command_blocks]]
name = "generate_threshold_optimized"
commands = ["run generate_case -D enable_thresholds=true -D model_block=set_model_threshold -D default_kinematics_block=set_default_kinematics_threshold -D compile=true -D horner_iterations=5 -D cpe_iterations=$(cpe_iterations:5)"]

[[command_blocks]]
name = "generate_no_threshold_cpe10000"
commands = ["run generate_no_threshold_optimized -D cpe_iterations=10000"]

[[command_blocks]]
name = "generate_threshold_cpe10000"
commands = ["run generate_threshold_optimized -D cpe_iterations=10000"]

[[command_blocks]]
name = "inspect_case"
commands = [
    "run $(model_block:set_model_no_threshold)",
    "run $(integrand_kinematics_block:set_integrand_kinematics_no_threshold)",
    "inspect -p BNL -i default -x $(x0:0.13) $(x1:0.27) $(x2:0.41) $(x3:0.58) $(x4:0.72) $(x5:0.86) --json-output ./examples/cli/BNL/outputs/$(output_file:no_threshold_inspect.json)",
]

[[command_blocks]]
name = "inspect_no_threshold"
commands = ["run inspect_case -D output_file=no_threshold_inspect.json"]

[[command_blocks]]
name = "inspect_threshold"
commands = ["run inspect_case -D model_block=set_model_threshold -D integrand_kinematics_block=set_integrand_kinematics_threshold -D x0=0.19 -D x1=0.33 -D x2=0.47 -D x3=0.61 -D x4=0.75 -D x5=0.89 -D output_file=threshold_inspect.json"]

[[command_blocks]]
name = "inspect_no_threshold_optimized"
commands = ["run inspect_case -D output_file=no_threshold_optimized_inspect.json"]

[[command_blocks]]
name = "inspect_threshold_optimized"
commands = ["run inspect_case -D model_block=set_model_threshold -D integrand_kinematics_block=set_integrand_kinematics_threshold -D x0=0.19 -D x1=0.33 -D x2=0.47 -D x3=0.61 -D x4=0.75 -D x5=0.89 -D output_file=threshold_optimized_inspect.json"]

[[command_blocks]]
name = "bench_case"
commands = [
    "run $(model_block:set_model_no_threshold)",
    "run $(integrand_kinematics_block:set_integrand_kinematics_no_threshold)",
    "inspect -p BNL -i default -x $(x0:0.13) $(x1:0.27) $(x2:0.41) $(x3:0.58) $(x4:0.72) $(x5:0.86) --bench $(bench_seconds:5) --n_batches $(n_batches:10) --minimal-integrand --json-output ./examples/cli/BNL/outputs/$(output_file:no_threshold_bench.json)",
]

[[command_blocks]]
name = "bench_no_threshold"
commands = ["run bench_case -D output_file=no_threshold_bench.json"]

[[command_blocks]]
name = "bench_threshold"
commands = ["run bench_case -D model_block=set_model_threshold -D integrand_kinematics_block=set_integrand_kinematics_threshold -D x0=0.19 -D x1=0.33 -D x2=0.47 -D x3=0.61 -D x4=0.75 -D x5=0.89 -D output_file=threshold_bench.json"]

[[command_blocks]]
name = "bench_no_threshold_optimized"
commands = ["run bench_case -D output_file=no_threshold_optimized_bench.json"]

[[command_blocks]]
name = "bench_threshold_optimized"
commands = ["run bench_case -D model_block=set_model_threshold -D integrand_kinematics_block=set_integrand_kinematics_threshold -D x0=0.19 -D x1=0.33 -D x2=0.47 -D x3=0.61 -D x4=0.75 -D x5=0.89 -D output_file=threshold_optimized_bench.json"]

[[command_blocks]]
name = "bench_no_threshold_cpe10000"
commands = ["run bench_case -D output_file=no_threshold_cpe10000_bench.json"]

[[command_blocks]]
name = "bench_threshold_cpe10000"
commands = ["run bench_case -D model_block=set_model_threshold -D integrand_kinematics_block=set_integrand_kinematics_threshold -D x0=0.19 -D x1=0.33 -D x2=0.47 -D x3=0.61 -D x4=0.75 -D x5=0.89 -D output_file=threshold_cpe10000_bench.json"]

[[command_blocks]]
name = "integrate_case"
commands = [
    "run $(model_block:set_model_no_threshold)",
    "run $(integrand_kinematics_block:set_integrand_kinematics_no_threshold)",
    "set process -p BNL -i default kv integrator.n_start=$(n_start:1000) integrator.n_increase=$(n_increase:0) integrator.n_max=$(n_max:1000) integrator.seed=$(seed:1337)",
    "integrate -p BNL -i default --n-cores $(n_cores:1) --batch-size $(batch_size:100) --renderer tabled --no-stream-iterations --workspace-path ./examples/cli/BNL/workspaces/$(workspace:no_threshold) --restart",
]

[[command_blocks]]
name = "integrate_no_threshold"
commands = ["run integrate_case -D workspace=no_threshold -D seed=1337"]

[[command_blocks]]
name = "integrate_threshold"
commands = ["run integrate_case -D model_block=set_model_threshold -D integrand_kinematics_block=set_integrand_kinematics_threshold -D workspace=threshold -D seed=7331"]

[[command_blocks]]
name = "integrate_no_threshold_optimized"
commands = ["run integrate_case -D workspace=no_threshold_optimized -D seed=1337"]

[[command_blocks]]
name = "integrate_threshold_optimized"
commands = ["run integrate_case -D model_block=set_model_threshold -D integrand_kinematics_block=set_integrand_kinematics_threshold -D workspace=threshold_optimized -D seed=7331"]

