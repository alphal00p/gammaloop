name = "bench_bnl_reference"
commands = [
    "run set_bnl_reference_runtime -D mt=$(mt:400.0) -D ymt=$(ymt:400.0) -D disable_threshold_subtraction=$(disable_threshold_subtraction:false) -D integrated_h_sigma=$(integrated_h_sigma:1.0) -D local_gaussian_width=$(local_gaussian_width:1.0) -D helicities=$(helicities:-1,1,-1,1,1,-1,1)",
    "inspect -p BNL -i default -x $(x0:0.19) $(x1:0.33) $(x2:0.47) $(x3:0.61) $(x4:0.75) $(x5:0.89) --bench $(bench_seconds:5) --n_batches $(n_batches:10) --minimal-integrand --json-output ./examples/cli/BNL/outputs/$(output_file:bnl_reference_bench.json)",
]

[[command_blocks]]
name = "integrate_bnl_reference"
commands = [
    "run set_bnl_reference_runtime -D mt=$(mt:400.0) -D ymt=$(ymt:400.0) -D disable_threshold_subtraction=$(disable_threshold_subtraction:false) -D integrated_h_sigma=$(integrated_h_sigma:1.0) -D local_gaussian_width=$(local_gaussian_width:1.0) -D helicities=$(helicities:-1,1,-1,1,1,-1,1)",
    "set process -p BNL -i default kv integrator.n_start=$(n_start:200000) integrator.n_increase=0 integrator.n_max=$(n_max:2000000) integrator.seed=$(seed:990401)",
    "integrate -p BNL -i default --n-cores $(n_cores:5) --batch-size $(batch_size:5000) --renderer tabled --no-stream-iterations --workspace-path ./examples/cli/BNL/workspaces/$(workspace:bnl_reference) --restart",
]

[[command_blocks]]
name = "integrate_bnl_reference_continue"
commands = [
    "run set_bnl_reference_runtime -D mt=$(mt:400.0) -D ymt=$(ymt:400.0) -D disable_threshold_subtraction=$(disable_threshold_subtraction:false) -D integrated_h_sigma=$(integrated_h_sigma:1.0) -D local_gaussian_width=$(local_gaussian_width:1.0) -D helicities=$(helicities:-1,1,-1,1,1,-1,1)",
    "set process -p BNL -i default kv integrator.n_start=$(n_start:200000) integrator.n_increase=0 integrator.n_max=$(n_max:2000000) integrator.seed=$(seed:990401)",
    "integrate -p BNL -i default --n-cores $(n_cores:5) --batch-size $(batch_size:5000) --renderer tabled --no-stream-iterations --workspace-path ./examples/cli/BNL/workspaces/$(workspace:bnl_reference)",
]

[[command_blocks]]
name = "integrate_bnl_reference_variant"
commands = [
    "run set_bnl_reference_runtime_variant -D mt=$(mt:400.0) -D ymt=$(ymt:400.0) -D disable_threshold_subtraction=$(disable_threshold_subtraction:false) -D integrated_h_sigma=$(integrated_h_sigma:1.0) -D local_gaussian_width=$(local_gaussian_width:1.0) -D helicities=$(helicities:-1,1,-1,1,1,-1,1) -D graphs=$(graphs:summed) -D orientations=$(orientations:summed) -D lmb_multichanneling=$(lmb_multichanneling:false) -D lmb_channels=$(lmb_channels:summed) -D mapping=$(mapping:linear) -D b=$(b:1.0) -D mu_r=$(mu_r:1000.0) -D m_uv=$(m_uv:1000.0)",
    "set process -p BNL -i default kv integrator.n_start=$(n_start:100000) integrator.n_increase=0 integrator.n_max=$(n_max:1000000) integrator.seed=$(seed:990501)",
    "integrate -p BNL -i default --n-cores $(n_cores:5) --batch-size $(batch_size:5000) --renderer tabled --no-stream-iterations --workspace-path ./examples/cli/BNL/workspaces/$(workspace:bnl_reference_variant) --restart",
]
