[[command_blocks]]
name = "set_bnl_reference_runtime"
commands = [
    "run set_model -D mt=$(mt:400.0) -D ymt=$(ymt:400.0)",
    "run set_kinematics_bnl_reference -D disable_threshold_subtraction=$(disable_threshold_subtraction:false) -D helicities=$(helicities:-1,1,-1,1,1,-1,1)",
