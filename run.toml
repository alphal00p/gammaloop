#:schema https://raw.githubusercontent.com/alphal00p/gammaloop/v0.3.3/assets/schemas/runhistory.json
commands = ["run generate_bnl_reference_case -D generate_integrated=true -D generate_cores=1 -D explicit_orientation_sum_only=false -D summed=false -D summed_function_map=false -D enable_thresholds=false -D disable_threshold_subtraction=true -D mt=510.0 -D ymt=510.0"]

[default_runtime_settings.general]
m_uv = 91.188
mu_r = 91.188
integral_unit = "none"

[default_runtime_settings.integrator]
n_start = 1000
n_increase = 0
n_max = 1000
seed = 1337

[default_runtime_settings.integrator.observables_output]
format = [
    "hwu",
    "json",
]

[default_runtime_settings.stability]
escalate_if_exact_zero = false

[[default_runtime_settings.stability.levels]]
precision = "Double"
required_precision_for_re = 0.00001
required_precision_for_im = 0.00001
escalate_for_large_weight_threshold = -1.0

[default_runtime_settings.subtraction]
disable_threshold_subtraction = true

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
horner_iterations = 0
cpe_iterations = 0

[cli_settings.global.generation.tropical_subgraph_table]
disable_tropical_generation = true

[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = false
check_esurface_at_generation = true

[cli_settings.global.generation.uv]
softct = false
generate_integrated = false

[cli_settings.global.n_cores]
generate = 4

[[command_blocks]]
name = "load_graph"
commands = [
    "import model sm-default.json",
    "remove processes",
    "import graphs ./examples/cli/BNL/BNL.dot -p BNL -i default -o --process-spec 'e+ e- > mu+ mu- a a a | e+ e- mu+ mu- a t t~ g ghG ghG~ QCD==2 QED==7 [{2}]'",
]

[[command_blocks]]
name = "set_model"
commands = [
    "set model MT=$(mt:300.0)",
    "set model WT=$(wt:0.0)",
    "set model ymt=$(ymt:300.0)",
    "set model aS=$(aS:0.118)",
    "set model aEWM1=$(aEWM1:137.036)",
    "set model Gf=$(Gf:1.166390e-05)",
    "set model MZ=$(MZ:91.188)",
]

[[command_blocks]]
name = "set_model_no_threshold"
commands = ["run set_model -D mt=300.0 -D ymt=300.0"]

[[command_blocks]]
name = "set_model_threshold"
commands = ["run set_model -D mt=200.0 -D ymt=200.0"]

[[command_blocks]]
name = "set_kinematics_no_threshold"
commands = ["""
set default-runtime string '
[general]
mu_r = 300.0
m_uv = 300.0

[subtraction]
disable_threshold_subtraction = true

[kinematics]
e_cm = 300.0

[kinematics.externals]
type = "constant"

[kinematics.externals.data]
momenta = [
    [ 150.0, 0.0, 0.0, 150.0 ],
    [ 150.0, 0.0, 0.0, -150.0 ],
    [ 53.51825383938285, 48.50595583701992, -21.22845370767228, -7.792848999878412 ],
    [ 52.10277750612693, 32.60751621535558, 35.30275695907613, -20.1287024223294 ],
    [ 65.95531624240965, -34.11832218221586, -14.79775199306813, -54.47082125375412 ],
