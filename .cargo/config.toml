[target.x86_64-unknown-linux-gnu]
linker = "cc"

[target.wasm32-unknown-unknown]
linker = "rust-lld"

[env]
# Visible to every rustc and every build script in the workspace build.
SYMBOLICA_OEM_LICENSE = { value = "SYMBOLICA_OEM_GAMMALOOP", force = false }

