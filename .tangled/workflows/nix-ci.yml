# Linux-only port of .github/workflows/crane-workflow.yml for Tangled spindle.
# Required pipeline secrets:
# - SYMBOLICA_LICENSE

when:
  - event: ["push", "manual"]
    branch: ["main"]
  - event: ["pull_request"]
    branch: ["main"]

engine: "nixery"

clone:
  depth: 1
  submodules: false

dependencies:
  nixpkgs:
    - bash
    - cacert
    - coreutils
    - findutils
    - gawk
    - git
    - gnugrep
    - gnused
    - nix

environment:
  CARGO_TERM_COLOR: "always"
  RUST_BACKTRACE: "1"

steps:
  - name: "Run Linux Nix CI"
    command: |
      # Tangled runs these Nix builds without sandboxing, and stdenv expects the
      # fallback HOME path to be absent in that mode.
      rm -rf /homeless-shelter

      system="$(nix eval --impure --raw --expr builtins.currentSystem)"

      nix build ".#checks.${system}.gammaloop-fmt" --print-build-logs
      nix build --impure ".#checks.${system}.gammaloop-clippy" --print-build-logs
      nix build --impure ".#checks.${system}.gammaloop-nextest" --print-build-logs
      nix build --impure ".#checks.${system}.gammaloop-doctest" --print-build-logs
      nix build ".#checks.${system}.gammaloop-doc" --print-build-logs
      nix build ".#packages.${system}.gammaloop-llvm-coverage" --print-build-logs
