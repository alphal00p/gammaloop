# Linux-only port of .github/workflows/crane-workflow.yml for Tangled spindle.
# Required pipeline secrets:
# - SYMBOLICA_LICENSE

when:
  - event: ["push", "manual"]
    branch: ["main"]
  - event: ["pull_request"]
    branch: ["main"]

engine: "nixery"

clone:
  depth: 1
  submodules: false

dependencies:
  nixpkgs:
    - bash
    - cacert
    - coreutils
    - findutils
    - gawk
    - git
    - gnugrep
    - gnused
    - nix

environment:
  CARGO_TERM_COLOR: "always"
  RUST_BACKTRACE: "1"

steps:
  - name: "Run Linux Nix CI"
    command: "bash .tangled/scripts/nix-ci.sh full-ci"
